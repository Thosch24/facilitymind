<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0F2942">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>FacilityMind AI</title>

<!-- PWA Icons inline as SVG data URIs -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='42' fill='%230F2942'/%3E%3Ctext x='96' y='130' font-size='110' text-anchor='middle'%3E🏭%3C/text%3E%3C/svg%3E">

<style>
:root{--p:#0F2942;--p2:#1A4F7A;--acc:#00C896;--dan:#E74C3C;--wrn:#F39C12;--ok:#27AE60;--crit:#8E44AD;--sf:#F7FAFB;--bd:#E8EDF4;--t1:#0F2942;--t2:#5D6D7E;--t3:#9DAFC0;--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:#CBD5E0;-webkit-font-smoothing:antialiased;overscroll-behavior:none;height:100dvh;overflow:hidden}
#root{width:100%;max-width:430px;margin:0 auto;height:100dvh;background:var(--sf);display:flex;flex-direction:column;position:relative;box-shadow:0 0 60px rgba(0,0,0,.3);overflow:hidden}
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(72px + var(--safe-bottom))}
#nav{flex-shrink:0;height:calc(60px + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:#fff;border-top:1px solid var(--bd);display:flex;align-items:flex-start;padding-top:6px;box-shadow:0 -4px 20px rgba(0,0,0,.07);z-index:100}
.page{animation:fadeIn .18s ease;padding:0 0 16px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Cards */
.card{background:#fff;border-radius:16px;border:1px solid var(--bd);box-shadow:0 2px 8px rgba(15,41,66,.05)}

/* Inputs */
input,select,textarea{font-family:inherit;font-size:13px;color:var(--t1);background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;padding:10px 12px;width:100%;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--p2);box-shadow:0 0 0 3px rgba(26,79,122,.1)}
textarea{resize:vertical;min-height:100px}
label.fl{font-size:10px;font-weight:800;color:var(--t2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}

/* Buttons */
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-appearance:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:700;border-radius:12px;transition:opacity .15s;border:none;font-family:inherit}
.btn:active{opacity:.7}
.btn-pri{background:linear-gradient(135deg,var(--p2),var(--p));color:#fff;padding:11px 20px;font-size:13px}
.btn-sm{padding:8px 14px;font-size:12px}
.btn-ghost{background:transparent;color:var(--p);border:1.5px solid var(--bd);padding:8px 14px;font-size:12px}
.btn-sec{background:var(--sf);color:var(--t1);border:1.5px solid var(--bd);padding:8px 14px;font-size:12px}
.btn-danger{background:var(--dan);color:#fff;padding:8px 14px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Badge */
.bdg{display:inline-block;font-size:9px;font-weight:800;padding:3px 8px;border-radius:50px;white-space:nowrap}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:430px;max-height:90dvh;overflow-y:auto;box-shadow:0 -12px 50px rgba(0,0,0,.25)}
.modal-handle{width:40px;height:4px;background:var(--bd);border-radius:2px;margin:12px auto 0}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:#fff;z-index:1}
.modal-body{padding:18px}

/* Nav item */
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 2px;cursor:pointer;position:relative}
.nav-dot{height:3px;background:var(--p);border-radius:2px;transition:width .3s cubic-bezier(.34,1.56,.64,1);margin-bottom:2px}
.nav-fab{width:52px;height:52px;margin-top:-20px;border-radius:50%;background:linear-gradient(135deg,var(--p2),var(--p));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;box-shadow:0 6px 20px rgba(15,41,66,.45);border:3px solid var(--sf)}

/* Filter bar */
.fbar{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.fbar::-webkit-scrollbar{display:none}
.fchip{white-space:nowrap;font-size:11px;font-weight:700;padding:6px 12px;border-radius:50px;cursor:pointer;border:none;flex-shrink:0;font-family:inherit;transition:all .15s}

/* Grid helpers */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

/* Photo thumb */
.thumb-wrap{position:relative;width:68px;height:68px;flex-shrink:0}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;border-radius:10px;border:1px solid var(--bd)}
.thumb-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--dan);color:#fff;font-size:11px;font-weight:800;border:2px solid #fff;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.thumb-add{width:68px;height:68px;border-radius:10px;border:2px dashed var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:2px;flex-shrink:0;background:var(--sf)}

/* Misc */
.sep{height:1px;background:var(--bd);margin:2px 0}
.hero{background:linear-gradient(148deg,#081525,var(--p) 55%,var(--p2));padding:22px 16px 20px;border-radius:0 0 22px 22px;margin-bottom:14px}
.stat-bar-track{flex:1;height:5px;background:var(--sf);border-radius:3px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.empty-state{text-align:center;padding:40px 20px;border:2px dashed var(--bd);border-radius:16px;margin:0 16px}
</style>
</head>
<body>
<div id="root">
  <div id="scroll"></div>
  <nav id="nav"></nav>
</div>

<script>
'use strict';
// ── CONSTANTS ──────────────────────────────────────────────────────────
const CLR={p:'#0F2942',p2:'#1A4F7A',acc:'#00C896',dan:'#E74C3C',wrn:'#F39C12',ok:'#27AE60',crit:'#8E44AD',sf:'#F7FAFB',bd:'#E8EDF4',t1:'#0F2942',t2:'#5D6D7E',t3:'#9DAFC0'};
const SC={ok:CLR.ok,soon:CLR.wrn,urgent:'#E67E22',overdue:CLR.dan,critical:CLR.crit};
const EM={HVAC_HEATING:'🔥',PUMP:'💧',HVAC_VENT:'🌬️',ELEC_DIST:'⚡',FIRE_PROT:'🚨',VALVE:'🔧',SENSOR:'📡',OTHER:'🏭'};
const TL={HVAC_HEATING:'Heizung',PUMP:'Pumpe',HVAC_VENT:'Lüftung',ELEC_DIST:'Elektro',FIRE_PROT:'Brandschutz',VALVE:'Ventil',SENSOR:'Sensor',OTHER:'Sonstiges'};

// ── PERSISTENT DB (localStorage) ───────────────────────────────────────
const DB={
  get(k,d=null){try{const v=localStorage.getItem('fm2_'+k);return v!=null?JSON.parse(v):d}catch{return d}},
  set(k,v){try{localStorage.setItem('fm2_'+k,JSON.stringify(v))}catch(e){console.warn('Storage full',e)}},
  del(k){localStorage.removeItem('fm2_'+k)},
  uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
};

// ── SEED ───────────────────────────────────────────────────────────────
function seed(){
  if(DB.get('seeded'))return;
  const ago=n=>new Date(Date.now()-n*864e5).toISOString().slice(0,10);
  const fwd=n=>new Date(Date.now()+n*864e5).toISOString().slice(0,10);
  DB.set('buildings',[
    {id:'b1',name:'Verwaltungsgebäude Nord',address:'Musterstraße 12',city:'80333 München',year:1998,area:2400,floors:6},
    {id:'b2',name:'Produktionshalle West',address:'Industrieweg 5',city:'80337 München',year:2010,area:5200,floors:1}
  ]);
  DB.set('rooms',[{id:'r1',bid:'b1',name:'Technikraum UG'},{id:'r2',bid:'b2',name:'Heizraum EG'}]);
  DB.set('assets',[
    {id:'a1',rid:'r1',bid:'b1',type:'FIRE_PROT',name:'Brandmeldeanlage BMA-01',mfr:'Minimax',model:'MX 4200',serial:'MIN-2019-4821',year:2019,photos:[]},
    {id:'a2',rid:'r2',bid:'b2',type:'HVAC_HEATING',name:'Heizkessel Vitodens',mfr:'Viessmann',model:'Vitodens 200-W',serial:'7571-2384-A',year:2019,kw:32,photos:[]},
    {id:'a3',rid:'r1',bid:'b1',type:'ELEC_DIST',name:'Hauptverteilung NSHV',mfr:'Siemens',model:'SIVACON S8',serial:'SIE-2018-9910',year:2018,photos:[]},
    {id:'a4',rid:'r2',bid:'b2',type:'PUMP',name:'Umwälzpumpe Grundfos',mfr:'Grundfos',model:'UPS 25-60',serial:'GRU-2020-1234',year:2020,photos:[]}
  ]);
  DB.set('plans',[
    {id:'p1',aid:'a1',title:'BMA Jahresinspektion',days:365,norm:'DIN 14675',legal:true,due:ago(18),done:ago(383),who:'Brandschutz-Sachkundiger'},
    {id:'p2',aid:'a3',title:'DGUV V3 Elektroprüfung',days:365,norm:'DGUV V3',legal:true,due:ago(3),done:ago(368),who:'Elektrofachkraft'},
    {id:'p3',aid:'a2',title:'Abgasmessung 1. BImSchV',days:365,norm:'1. BImSchV',legal:true,due:fwd(6),done:ago(359),who:'Schornsteinfeger'},
    {id:'p4',aid:'a2',title:'Viessmann Jahreswartung',days:365,norm:'Herstellervorgabe',legal:false,due:fwd(42),done:ago(323),who:'Viessmann-Fachbetrieb'},
    {id:'p5',aid:'a4',title:'Grundfos Pumpeninspektion',days:365,norm:'VDI 3814',legal:false,due:fwd(95),done:ago(270),who:'Fachbetrieb'},
    {id:'p6',aid:'a3',title:'Schaltanlage Sichtprüfung',days:180,norm:'DIN VDE 0105',legal:false,due:fwd(120),done:ago(60),who:'Elektrofachkraft'}
  ]);
  DB.set('records',[]);
  DB.set('seeded',1);
}

// ── HELPERS ────────────────────────────────────────────────────────────
function getSt(p){
  if(!p.due)return'ok';
  const d=Math.floor((new Date(p.due)-Date.now())/864e5);
  return d>30?'ok':d>7?'soon':d>=0?'urgent':p.legal&&Math.abs(d)>7?'critical':'overdue';
}
function daysLabel(due){
  const d=Math.floor((new Date(due)-Date.now())/864e5);
  return d<0?Math.abs(d)+' T überfällig':d===0?'Heute!':'in '+d+' T';
}
function fileToB64(file){return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(file)})}
function uid(){return DB.uid()}
function h(tag,props={},children=[]){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(props)){
    if(k==='cls')el.className=v;
    else if(k==='html')el.innerHTML=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of [children].flat(99)){
    if(c==null||c===false||c===undefined)continue;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  }
  return el;
}
const div=(p,c)=>h('div',p,c);
const span=(p,c)=>h('span',p,c);
const img=(p)=>h('img',p);

function badge(col,text){
  const b=span({cls:'bdg'});
  b.style.background=col+'22';b.style.color=col;
  b.textContent=text;return b;
}
function btn(label,cls,onClick,disabled=false){
  const b=h('button',{cls:'btn '+cls,onclick:onClick},label);
  if(disabled)b.disabled=true;
  return b;
}
function card(style={}){
  const c=div({cls:'card'});Object.assign(c.style,style);return c;
}
function field(label,value,onChange,opts={}){
  const wrap=div({});
  if(label)wrap.appendChild(h('label',{cls:'fl'},label));
  let inp;
  if(opts.options){
    inp=h('select');
    for(const[v,l]of opts.options){const o=h('option',{value:v},l);if(v==value)o.selected=true;inp.appendChild(o);}
    inp.addEventListener('change',()=>onChange(inp.value));
  }else if(opts.textarea){
    inp=h('textarea',{placeholder:opts.ph||''});inp.value=value||'';inp.addEventListener('input',()=>onChange(inp.value));
  }else{
    inp=h('input',{type:opts.type||'text',placeholder:opts.ph||''});inp.value=value||'';inp.addEventListener('input',()=>onChange(inp.value));
  }
  wrap.appendChild(inp);
  if(opts.mb!==false)wrap.style.marginBottom='13px';
  return{wrap,inp};
}

// ── MODAL ──────────────────────────────────────────────────────────────
function modal(title,bodyFn,onClose){
  const overlay=div({cls:'overlay'});
  overlay.addEventListener('click',e=>{if(e.target===overlay)close()});
  const box=div({cls:'modal'});
  box.appendChild(div({cls:'modal-handle'}));
  const hdr=div({cls:'modal-hdr'});
  hdr.appendChild(h('strong',{style:{fontSize:'15px',color:CLR.t1}},title));
  const xBtn=h('button',{style:{fontSize:'24px',color:CLR.t2,background:'none',border:'none',cursor:'pointer',lineHeight:'1',padding:'0 4px'},onclick:close},'×');
  hdr.appendChild(xBtn);
  box.appendChild(hdr);
  const body=div({cls:'modal-body'});
  box.appendChild(body);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  bodyFn(body,close);
  function close(){if(onClose)onClose();overlay.remove();}
  return{overlay,close};
}

// ── PHOTO PICKER ───────────────────────────────────────────────────────
function photoPicker(container,photos,onChange,max=8){
  function render(){
    container.innerHTML='';
    const wrap=div({style:{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'flex-start'}});
    for(let i=0;i<photos.length;i++){
      const tw=div({cls:'thumb-wrap'});
      tw.appendChild(img({src:photos[i],style:{width:'100%',height:'100%',objectFit:'cover',borderRadius:'10px',border:'1px solid #E8EDF4'}}));
      const del=div({cls:'thumb-del',onclick:()=>{photos.splice(i,1);onChange([...photos]);render()}},'×');
      tw.appendChild(del);wrap.appendChild(tw);
    }
    if(photos.length<max){
      const addBtn=div({cls:'thumb-add',onclick:()=>inp.click()});
      addBtn.appendChild(span({style:{fontSize:'24px'}},'📷'));
      addBtn.appendChild(span({style:{fontSize:'9px',color:CLR.t2,fontWeight:'700'}},'Foto'));
      wrap.appendChild(addBtn);
    }
    const inp=h('input',{type:'file',accept:'image/*',multiple:'true',style:{display:'none'}});
    inp.setAttribute('capture','environment');
    inp.addEventListener('change',async e=>{
      const files=[...e.target.files];
      const b64s=await Promise.all(files.map(fileToB64));
      const merged=[...photos,...b64s].slice(0,max);
      merged.forEach((_,i)=>photos[i]=merged[i]);photos.length=merged.length;
      onChange([...photos]);render();e.target.value='';
    });
    wrap.appendChild(inp);
    const info=div({style:{fontSize:'10px',color:CLR.t3,marginTop:'4px'}},photos.length+'/'+max+' Fotos');
    container.appendChild(wrap);container.appendChild(info);
  }
  render();
}

// ── AI ─────────────────────────────────────────────────────────────────
async function callAI(content,key,prov,isPhoto=false){
  const jsonPrompt=`Du bist TGA-Experte${isPhoto?' mit OCR':''}.${isPhoto?' Analysiere dieses Bild einer technischen Anlage oder eines Typenschilds. Extrahiere alle erkennbaren Daten per OCR.':' Analysiere: "'+content+'"'}\nAntworte NUR mit JSON (kein Markdown):\n{"assetType":"HVAC_HEATING|PUMP|HVAC_VENT|ELEC_DIST|FIRE_PROT|VALVE|SENSOR|OTHER","name":"string","manufacturer":"string|null","model":"string|null","serial":"string|null","year":number|null,"powerKw":number|null,"confidence":0-100,"ocrText":"string|null","maintenanceRules":[{"title":"string","norm":"string","intervalDays":number,"isLegal":boolean,"responsible":"string"}],"notes":"string"}`;
  if(prov==='openai'){
    const msgContent=isPhoto?[{type:'image_url',image_url:{url:content,detail:'high'}},{type:'text',text:jsonPrompt}]:[{type:'text',text:jsonPrompt}];
    const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+key},body:JSON.stringify({model:'gpt-4o',max_tokens:1500,messages:[{role:'user',content:msgContent}]})});
    if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.status)}
    return(await r.json()).choices[0].message.content;
  }
  const msgContent=isPhoto?[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:content.replace(/^data:image\/\w+;base64,/,'')}},{type:'text',text:jsonPrompt}]:[{type:'text',text:jsonPrompt}];
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:msgContent}]})});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.status)}
  return(await r.json()).content[0].text;
}

// ── APP STATE ──────────────────────────────────────────────────────────
const state={page:'dashboard',bldDetail:null,roomDetail:null,bldTab:'rooms'};

function navigate(page,extra={}){
  Object.assign(state,{page,...extra});
  render();
}

// ══════════════════════════════════════════════════════════════════
// PAGES
// ══════════════════════════════════════════════════════════════════

// ── DASHBOARD ──────────────────────────────────────────────────────────
function pageDashboard(){
  const plans=DB.get('plans',[]),assets=DB.get('assets',[]),blds=DB.get('buildings',[]);
  const sum=plans.reduce((a,p)=>{const s=getSt(p);a[s]=(a[s]||0)+1;return a},{});
  const critN=(sum.critical||0)+(sum.overdue||0)+(sum.urgent||0);
  const urgent=plans.filter(p=>['critical','overdue','urgent'].includes(getSt(p))).sort((a,b)=>new Date(a.due)-new Date(b.due));

  const root=div({cls:'page'});

  // Hero
  const hero=div({cls:'hero'});
  hero.appendChild(div({style:{fontSize:'11px',color:'rgba(255,255,255,.4)',marginBottom:'4px'}},new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})));
  const t=div({style:{fontSize:'24px',fontWeight:'800',color:'#fff',letterSpacing:'-.5px',marginBottom:'2px'}});
  t.innerHTML='FacilityMind <span style="color:#00C896">AI</span>';hero.appendChild(t);
  hero.appendChild(div({style:{fontSize:'12px',color:'rgba(255,255,255,.4)'}},`${blds.length} Gebäude · ${assets.length} Anlagen`));
  if((sum.critical||0)>0){
    const alert=div({cls:'card',style:{background:'rgba(231,76,60,.18)',border:'1px solid rgba(231,76,60,.3)',borderRadius:'12px',padding:'10px 14px',marginTop:'14px',display:'flex',alignItems:'center',gap:'10px',cursor:'pointer'},onclick:()=>navigate('maintenance')});
    alert.appendChild(span({},'🚨'));
    const at=div({style:{flex:'1'}});
    at.appendChild(div({style:{fontSize:'11px',fontWeight:'800',color:'#FF7070'}},sum.critical+' KRITISCH – Sofort handeln!'));
    at.appendChild(div({style:{fontSize:'10px',color:'rgba(255,255,255,.4)'}},'Gesetzliche Pflicht überfällig'));
    alert.appendChild(at);alert.appendChild(span({style:{color:'rgba(255,100,100,.5)'}},'›'));
    hero.appendChild(alert);
  }
  root.appendChild(hero);

  // KPIs
  const kpis=div({cls:'g4',style:{padding:'0 14px 14px'}});
  [[blds.length,'Gebäude',CLR.p],[assets.length,'Anlagen',CLR.p2],[critN,'Aktion',CLR.dan],[plans.length,'Pläne',CLR.acc]].forEach(([v,l,col])=>{
    const k=card({padding:'12px 8px',textAlign:'center'});
    k.appendChild(div({style:{fontSize:'22px',fontWeight:'800',color:col,lineHeight:'1'}},v));
    k.appendChild(div({style:{fontSize:'9px',fontWeight:'700',color:CLR.t2,marginTop:'2px',textTransform:'uppercase'}},l));
    kpis.appendChild(k);
  });
  root.appendChild(kpis);

  // Status
  const sw=div({style:{padding:'0 14px 14px'}});
  sw.appendChild(div({style:{fontSize:'13px',fontWeight:'800',color:CLR.t1,marginBottom:'10px'}},'Wartungsstatus'));
  const sc=card({padding:'14px'});
  [['ok','OK',CLR.ok],['soon','Bald',CLR.wrn],['urgent','Dringend','#E67E22'],['overdue','Überfällig',CLR.dan],['critical','Kritisch §',CLR.crit]].forEach(([k,l,col])=>{
    const row=div({style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}});
    row.appendChild(div({style:{width:'8px',height:'8px',borderRadius:'50%',background:col,flexShrink:'0'}}));
    row.appendChild(div({style:{fontSize:'11px',color:CLR.t1,width:'76px',flexShrink:'0'}},l));
    const track=div({cls:'stat-bar-track'});
    const fill=div({cls:'stat-bar-fill',style:{width:plans.length?((sum[k]||0)/plans.length*100)+'%':'0%',background:col}});
    track.appendChild(fill);row.appendChild(track);
    row.appendChild(div({style:{fontSize:'11px',fontWeight:'800',color:col,width:'16px',textAlign:'right'}},sum[k]||0));
    sc.appendChild(row);

  function showRoomScan(){

        del.textContent='×';tw.appendChild(del);grid.appendChild(tw);

        [['1.','Gesamtansicht Raum vom Eingang'],['2.','Decke mit Beleuchtung'],['3.','Boden & Wände'],['4.','Fenster (Anzahl & Zustand)'],['5.','Technische Anlagen, Heizkörper']].forEach(([n,t])=>{

    async function runScan(){
      if(!apiKey){alert('Bitte zuerst API-Key in Einstellungen eintragen');return;}
      scanStep='analyzing';renderStep();
      try{
        const prompt=`Du bist Facility Manager und Baugutachter. Analysiere diese ${photos.length} Raum-Fotos sehr detailliert.
Antworte NUR mit validem JSON (kein Markdown, keine Erklärung):
{"name":"Raumname","type":"OFFICE|TECHNICAL|CORRIDOR|STORAGE|WC|MEETING|OTHER","area_m2":Zahl_oder_null,"length_m":Zahl_oder_null,"width_m":Zahl_oder_null,"height_m":Zahl_oder_null,"floor":Zahl_oder_null,"windows":{"count":Zahl,"size":"klein|mittel|gross","condition":"gut|mittel|schlecht","type":"Einfach|Doppel|Dreifach|unbekannt"},"floor_type":"Parkett|Laminat|Teppich|Fliesen|Beton|Linoleum|unbekannt","floor_condition":"gut|mittel|schlecht","ceiling_type":"Putz|Akustikdecke|Betondecke|Abdecke|unbekannt","ceiling_condition":"gut|mittel|schlecht","lighting":{"type":"LED|Leuchtstoffröhre|Halogen|gemischt|unbekannt","count":Zahl_oder_null,"condition":"gut|mittel|schlecht"},"technical_assets":[{"type":"HVAC_HEATING|PUMP|HVAC_VENT|ELEC_DIST|FIRE_PROT|VALVE|SENSOR|OTHER","name":"string","details":"string"}],"wall_condition":"gut|mittel|schlecht","overall_condition":"gut|mittel|schlecht|renovierungsbedürftig","notes":"Mängel und Beobachtungen","confidence":0-100}`;

        let msgContent;
        if(provider==='openai'){
          msgContent=photos.map(p=>({type:'image_url',image_url:{url:p,detail:'high'}}));
          msgContent.push({type:'text',text:prompt});
          const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+apiKey},body:JSON.stringify({model:'gpt-4o',max_tokens:2000,messages:[{role:'user',content:msgContent}]})});
          if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.status);}
          scanResult=JSON.parse((await r.json()).choices[0].message.content.replace(/```json?|```/g,'').trim());
        }else{
          msgContent=photos.map(p=>({type:'image',source:{type:'base64',media_type:'image/jpeg',data:p.replace(/^data:image\/\w+;base64,/,'')}}));
          msgContent.push({type:'text',text:prompt});

          scanResult=JSON.parse((await r.json()).content[0].text.replace(/```json?|```/g,'').trim());

function pageMaintenance(){
  const root=div({cls:'page'});
  let plans=DB.get('plans',[]);
  const assets=DB.get('assets',[]);
  let filt='all';

  const sticky=div({style:{background:'#fff',borderBottom:'1px solid '+CLR.bd,padding:'14px 14px 0',position:'sticky',top:'0',zIndex:'10'}});
  sticky.appendChild(div({style:{fontSize:'20px',fontWeight:'800',color:CLR.t1,marginBottom:'12px'}},'Wartungsplan'));
  const fbar=div({cls:'fbar',style:{paddingBottom:'12px'}});
  sticky.appendChild(fbar);root.appendChild(sticky);

  const sumBar=div({style:{background:`linear-gradient(120deg,${CLR.p},${CLR.p2})`,margin:'14px 14px 10px',borderRadius:'14px',padding:'13px 14px',display:'flex'}});
  root.appendChild(sumBar);
  const listWrap=div({style:{padding:'0 14px',display:'flex',flexDirection:'column',gap:'8px'}});
  root.appendChild(listWrap);

  function refresh(){plans=DB.get('plans',[]);buildTabs();buildSum();buildList();}

  function buildTabs(){
    fbar.innerHTML='';
    const sum=plans.reduce((a,p)=>{const s=getSt(p);a[s]=(a[s]||0)+1;return a},{});
    const act=(sum.critical||0)+(sum.overdue||0)+(sum.urgent||0);
    const tabs=[['all','Alle ('+plans.length+')'],['action','Aktion ('+act+')'],['critical','Kritisch 🟣'],['overdue','Überfällig 🔴'],['urgent','Dringend 🟠'],['soon','Bald 🟡'],['ok','OK ✅'],['legal','⚖ §']];
    for(const[k,l]of tabs){
      const b=h('button',{cls:'fchip',onclick:()=>{filt=k;buildTabs();buildList();}},l);

      const{wrap:rw}=field('Ergebnis',rec.result,v=>rec.result=v,{options:[['OK','✅ Keine Mängel'],['DEFECT','⚠️ Mangel festgestellt'],['PARTIAL','🔶 Teilweise erledigt']]});
      const{wrap:nw}=field('Notizen',rec.notes,v=>rec.notes=v,{textarea:true,ph:'Optional...'});

        DB.set('records',recs);
        const u=plans.map(x=>x.id!==p.id?x:{...x,done:new Date().toISOString().slice(0,10),due:new Date(Date.now()+x.days*864e5).toISOString().slice(0,10)});

    const inst=card({padding:'14px',marginBottom:'12px',background:CLR.acc+'12',border:'1px solid '+CLR.acc+'44'});
    inst.appendChild(div({style:{fontSize:'12px',fontWeight:'800',color:CLR.acc,marginBottom:'6px'}},'📲 Als App installieren (empfohlen)'));
    [['1.','Diese Seite in Safari öffnen'],['2.','Teilen-Button tippen (□↑)'],['3.','"Zum Home-Bildschirm" wählen'],['4.','Fertig – startet wie native App!']].forEach(([n,t])=>{
      const row=div({style:{display:'flex',gap:'8px',fontSize:'11px',color:CLR.t1,marginBottom:'4px'}});
      row.appendChild(span({style:{fontWeight:'800',color:CLR.acc,width:'14px'}},n));
      row.appendChild(span({},t));
      inst.appendChild(row);
    });
    root.appendChild(inst);
  }

  // Reset
  const resetBtn=btn('🔄 Demo-Daten zurücksetzen','btn-sec',()=>{
    if(!confirm('Alle Daten löschen und Demo-Daten neu laden?'))return;
    Object.keys(localStorage).filter(k=>k.startsWith('fm2_')).forEach(k=>localStorage.removeItem(k));
    seed();render();
  });
  resetBtn.style.width='100%';resetBtn.style.justifyContent='center';resetBtn.style.padding='12px';resetBtn.style.borderRadius='12px';resetBtn.style.marginBottom='16px';
  root.appendChild(resetBtn);
  return root;
}

// ── NAV ────────────────────────────────────────────────────────────────
function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML='';
  const plans=DB.get('plans',[]);
  const critBadge=plans.filter(p=>getSt(p)==='critical').length;
  const items=[['dashboard','🏠','Home',false,0],['buildings','🏢','Gebäude',false,0],['scan','📷','Scan',true,0],['maintenance','🔧','Wartung',false,critBadge],['settings','⚙️','Mehr',false,0]];
  for(const[k,e,l,fab,bdg]of items){
    const item=div({cls:'nav-item',onclick:()=>navigate(k,{bldDetail:null})});
    if(fab){
      const f=div({cls:'nav-fab'});
      f.appendChild(span({style:{fontSize:'20px'}},e));
      f.appendChild(span({style:{fontSize:'7px',color:'#fff',fontWeight:'800',letterSpacing:'.5px'}},'SCAN'));
      item.appendChild(f);
    }else{
      const dot=div({cls:'nav-dot',style:{width:state.page===k?'26px':'0px'}});
      item.appendChild(dot);
      const wrap=div({style:{position:'relative'}});
      wrap.appendChild(span({style:{fontSize:'20px',filter:state.page===k?'none':'grayscale(1) opacity(.4)'}},e));
      if(bdg>0){
        const b=div({style:{position:'absolute',top:'-4px',right:'-4px',width:'14px',height:'14px',background:CLR.dan,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'9px',fontWeight:'800',color:'#fff'}},bdg);
        wrap.appendChild(b);
      }
      item.appendChild(wrap);
      item.appendChild(span({style:{fontSize:'9px',fontWeight:state.page===k?'800':'600',color:state.page===k?CLR.p:CLR.t3}},l));
    }
    nav.appendChild(item);
  }
}

// ── RENDER ─────────────────────────────────────────────────────────────
let _lastPage=null;
function render(){
  // Cleanup previous page
  if(_lastPage?._cleanup)_lastPage._cleanup();
  const scroll=document.getElementById('scroll');
  scroll.innerHTML='';
  const pages={dashboard:pageDashboard,buildings:pageBuildings,scan:pageScan,maintenance:pageMaintenance,settings:pageSettings};
  const page=(pages[state.page]||pageDashboard)();
  _lastPage=page;
  scroll.appendChild(page);
  scroll.scrollTop=0;
  renderNav();
}

// ── SERVICE WORKER (inline) ─────────────────────────────────────────────
function registerSW(){
  if(!('serviceWorker' in navigator))return;
  const sw=`
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('activate',e=>clients.claim());
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('api.anthropic.com')||e.request.url.includes('openai.com')){
    e.respondWith(fetch(e.request));return;
  }
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
});`;
  const blob=new Blob([sw],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}

// ── INIT ───────────────────────────────────────────────────────────────
seed();
registerSW();
render();
</script>
