<style>

<script>
'use strict';
// ── CONSTANTS ──────────────────────────────────────────────────────────
// ── VERSION & UPDATE ──────────────────────────────────────────────────
const APP_VERSION='1.0.0';
const GITHUB_RAW='https://raw.githubusercontent.com/thosch24/facilitymind/main/index.html';
const GITHUB_URL='https://thosch24.github.io/facilitymind/';

async function checkForUpdate(){
  try{
    const res=await fetch(GITHUB_RAW+'?t='+Date.now(),{cache:'no-store'});
    if(!res.ok)return null;
    const html=await res.text();
    const m=html.match(/APP_VERSION='([^']+)'/);
    if(!m)return null;
    const remote=m[1];
    return remote!==APP_VERSION?remote:null;
  }catch(e){return null;}
}

function versionCompare(a,b){
  const pa=a.split('.').map(Number),pb=b.split('.').map(Number);
  for(let i=0;i<3;i++){if((pa[i]||0)>(pb[i]||0))return 1;if((pa[i]||0)<(pb[i]||0))return -1;}
  return 0;
}

async function doUpdate(){
  try{
    const res=await fetch(GITHUB_RAW+'?t='+Date.now(),{cache:'no-store'});
    if(!res.ok)throw new Error('Fetch fehlgeschlagen');
    const html=await res.text();
    // Open in new tab - user saves manually (PWA limitation)
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    // Reload the page from GitHub directly
    window.location.href=GITHUB_URL+'?nocache='+Date.now();
  }catch(e){alert('Update fehlgeschlagen: '+e.message);}
}

let _updateBanner=null;
async function showUpdateBannerIfNeeded(){
  const newVer=await checkForUpdate();
  if(!newVer||versionCompare(newVer,APP_VERSION)<=0)return;
  if(_updateBanner)return;
  _updateBanner=document.createElement('div');
  _updateBanner.style.cssText='position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:linear-gradient(135deg,#0099CC,#00D4FF);color:#000;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:10000;font-family:-apple-system,sans-serif;box-shadow:0 4px 20px rgba(0,212,255,.4)';
  const txt=document.createElement('div');
  txt.innerHTML='<div style="font-size:12px;font-weight:800">🔄 Update verfügbar – v'+newVer+'</div><div style="font-size:10px;opacity:.7">Tippen zum Installieren</div>';
  const btns=document.createElement('div');btns.style.cssText='display:flex;gap:8px;flex-shrink:0';
  const updBtn=document.createElement('button');
  updBtn.style.cssText='background:rgba(0,0,0,.2);border:none;color:#000;font-weight:800;font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:inherit';
  updBtn.textContent='Installieren';
  updBtn.onclick=()=>doUpdate();
  const closeBtn=document.createElement('button');
  closeBtn.style.cssText='background:none;border:none;color:#000;font-size:18px;padding:4px 8px;cursor:pointer';
  closeBtn.textContent='×';
  closeBtn.onclick=()=>{_updateBanner.remove();_updateBanner=null;};
  btns.appendChild(updBtn);btns.appendChild(closeBtn);
  _updateBanner.appendChild(txt);_updateBanner.appendChild(btns);
  document.body.appendChild(_updateBanner);
  // Shift scroll container down
  document.getElementById('scroll').style.paddingTop='48px';
}

const CLR={p:'#00D4FF',p2:'#0099CC',acc:'#00FFB3',dan:'#FF4757',wrn:'#FFA502',ok:'#2ED573',crit:'#A855F7',sf:'#162030',bd:'#1E2D42',bd2:'#253650',t1:'#EEF2FF',t2:'#7A90B8',t3:'#3D5070',bg:'#080E1A',bg2:'#0F1924',bg3:'#162030',bg4:'#1C2A3E'};
const SC={ok:CLR.ok,soon:CLR.wrn,urgent:'#FF8C00',overdue:CLR.dan,critical:CLR.crit};
const EM={HVAC_HEATING:'🔥',PUMP:'💧',HVAC_VENT:'🌬️',ELEC_DIST:'⚡',FIRE_PROT:'🚨',VALVE:'🔧',SENSOR:'📡',OTHER:'🏭'};
const TL={HVAC_HEATING:'Heizung',PUMP:'Pumpe',HVAC_VENT:'Lüftung',ELEC_DIST:'Elektro',FIRE_PROT:'Brandschutz',VALVE:'Ventil',SENSOR:'Sensor',OTHER:'Sonstiges'};

// ── LIGHTBOX ──────────────────────────────────────────────────────────
function showLightbox(photos, startIdx){
  if(!photos||!photos.length)return;
  let idx=startIdx||0;
  const lb=document.createElement('div');lb.className='lbx';
  const closeBtn=document.createElement('button');closeBtn.className='lbx-close';closeBtn.textContent='×';
  closeBtn.onclick=()=>lb.remove();
  const imgEl=document.createElement('img');
  const dots=document.createElement('div');dots.className='lbx-dots';
  function upd(){
    imgEl.src=photos[idx];
    dots.innerHTML='';
    photos.forEach((_,i)=>{
      const d=document.createElement('div');
      d.className='lbx-dot'+(i===idx?' act':'');
      d.onclick=()=>{idx=i;upd();};
      dots.appendChild(d);
    });
  }
  let sx=0;
  lb.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
  lb.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)>45){idx=dx<0?Math.min(idx+1,photos.length-1):Math.max(idx-1,0);upd();}
  });
  lb.appendChild(closeBtn);lb.appendChild(imgEl);
  if(photos.length>1)lb.appendChild(dots);
  document.body.appendChild(lb);
  upd();
}

// ── GALLERY COMPONENT ─────────────────────────────────────────────────
function makeGallery(container, photos, onChange, maxPhotos, emptyLabel){
  maxPhotos=maxPhotos||10; emptyLabel=emptyLabel||'Fotos hinzufügen';
  var fileInp=container.querySelector('input[type=file]._gal');
  if(!fileInp){
    fileInp=document.createElement('input');
    fileInp.type='file';fileInp.accept='image/*';fileInp.multiple=true;
    fileInp.setAttribute('capture','environment');
    fileInp.className='_gal';fileInp.style.display='none';
    fileInp.addEventListener('change',function(e){
      var files=[].slice.call(e.target.files);
      var pending=files.length; var added=[];
      files.forEach(function(f){
        var fr=new FileReader();
        fr.onload=function(ev){
          added.push(ev.target.result);
          if(--pending===0){
            var merged=photos.concat(added).slice(0,maxPhotos);
            photos.length=0;merged.forEach(function(p){photos.push(p);});
            onChange(photos.slice());drawGallery();
          }
        };
        fr.readAsDataURL(f);
      });
      e.target.value='';
    });
    container.appendChild(fileInp);
  }
  function drawGallery(){
    // Remove all children except fileInp
    var kids=[].slice.call(container.childNodes);
    kids.forEach(function(k){if(k!==fileInp)container.removeChild(k);});
    if(photos.length===0){
      var empty=document.createElement('div');
      empty.style.cssText='border:2px dashed '+CLR.bd2+';border-radius:14px;padding:28px 16px;text-align:center;cursor:pointer;background:'+CLR.bg4;
      empty.innerHTML='<div style="font-size:36px;margin-bottom:8px">📷</div><div style="font-size:13px;font-weight:700;color:'+CLR.t1+';margin-bottom:3px">'+emptyLabel+'</div><div style="font-size:11px;color:'+CLR.t2+'">Bis zu '+maxPhotos+' Fotos</div>';
      empty.onclick=function(){fileInp.click();};
      container.insertBefore(empty,fileInp);
    } else {
      var heroWrap=document.createElement('div');heroWrap.className='gal-hero';
      var heroImg=document.createElement('img');heroImg.src=photos[0];
      heroImg.onclick=function(){showLightbox(photos,0);};
      var heroOv=document.createElement('div');heroOv.className='gal-overlay';
      // count badge
      var cnt=document.createElement('div');
      cnt.style.cssText='position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.65);color:#fff;font-size:11px;font-weight:800;padding:3px 9px;border-radius:16px;backdrop-filter:blur(4px)';
      cnt.textContent='📷 '+photos.length;
      // del button
      var delBtn=document.createElement('button');
      delBtn.style.cssText='position:absolute;top:8px;left:8px;background:rgba(255,71,87,.85);color:#fff;border:none;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit';
      delBtn.textContent='🗑 Entfernen';
      var heroIdx=0;
      delBtn.onclick=function(e){e.stopPropagation();photos.splice(heroIdx,1);onChange(photos.slice());drawGallery();};
      heroWrap.appendChild(heroImg);heroWrap.appendChild(heroOv);heroWrap.appendChild(cnt);heroWrap.appendChild(delBtn);
      container.insertBefore(heroWrap,fileInp);
      // strip
      var strip=document.createElement('div');strip.className='gal-strip';
      photos.forEach(function(p,i){
        var t=document.createElement('div');t.className='gal-thumb'+(i===0?' act':'');
        var ti=document.createElement('img');ti.src=p;
        ti.onclick=function(){heroImg.src=p;heroIdx=i;strip.querySelectorAll('.gal-thumb').forEach(function(el,j){el.className='gal-thumb'+(j===i?' act':'');});};
        t.appendChild(ti);strip.appendChild(t);
      });
      if(photos.length<maxPhotos){
        var addT=document.createElement('div');addT.className='gal-add';addT.textContent='+';
        addT.onclick=function(){fileInp.click();};
        strip.appendChild(addT);
      }
      container.insertBefore(strip,fileInp);
    }
  }
  drawGallery();
}


// ── AUTO BACKUP SYSTEM ────────────────────────────────────────────────
const BACKUP_INTERVAL_DAYS = 1; // täglich
const BACKUP_KEY = 'fm2_last_backup';

function getBackupData(){
  return JSON.stringify({
    version: APP_VERSION,
    exported: new Date().toISOString(),
    device: navigator.userAgent.includes('iPhone')?'iPhone':'Other',
    buildings: DB.get('buildings',[]),
    rooms: DB.get('rooms',[]),
    assets: DB.get('assets',[]),
    plans: DB.get('plans',[]),
    records: DB.get('records',[])
  }, null, 2);
}

function daysSinceBackup(){
  const last = localStorage.getItem(BACKUP_KEY);
  if(!last) return 999;
  return (Date.now() - new Date(last).getTime()) / 864e5;
}

function markBackupDone(){
  localStorage.setItem(BACKUP_KEY, new Date().toISOString());
}

async function saveBackupToFiles(silent){
  const json = getBackupData();
  const date = new Date().toISOString().slice(0,10);
  const filename = 'FacilityMind_Backup_' + date + '.json';
  const blob = new Blob([json], {type:'application/json'});
  const file = new File([blob], filename, {type:'application/json'});

  // Try Web Share API (iOS Safari supports this → saves to iCloud Drive)
  if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
    try{
      await navigator.share({
        title: 'FacilityMind Backup',
        text: 'Backup ' + date,
        files: [file]
      });
      markBackupDone();
      return true;
    }catch(e){
      if(e.name !== 'AbortError') console.warn('Share error:', e);
      return false;
    }
  } else {
    // Fallback: download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
    markBackupDone();
    return true;
  }
}

  const icon = document.createElement('div');
  icon.style.cssText = 'font-size:28px;flex-shrink:0';
  icon.textContent = '☁️';

  const text = document.createElement('div');
  text.style.flex = '1';
  const title = document.createElement('div');
  title.style.cssText = 'font-size:13px;font-weight:800;color:#EEF2FF;margin-bottom:2px';
  title.textContent = 'Tägliches Backup';
  const sub = document.createElement('div');
  sub.style.cssText = 'font-size:11px;color:#7A90B8';
  sub.textContent = 'Daten in iCloud Drive sichern?';
  text.appendChild(title); text.appendChild(sub);

  const btns = document.createElement('div');
  btns.style.cssText = 'display:flex;flex-direction:column;gap:5px;flex-shrink:0';

  const saveBtn = document.createElement('button');
  saveBtn.style.cssText = 'background:linear-gradient(135deg,#0099CC,#00D4FF);color:#000;border:none;border-radius:9px;padding:7px 14px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap';
  saveBtn.textContent = '☁️ Sichern';
  saveBtn.onclick = async () => {
    banner.remove();
    await saveBackupToFiles(false);
  };

// Dual-write: localStorage + sessionStorage as backup (iOS PWA fix)
const DB={
  _k(k){return 'fm2_'+k},
  get(k,d=null){
    try{
      let v=localStorage.getItem(this._k(k));
      if(v!=null){try{sessionStorage.setItem(this._k(k),v)}catch(e){}return JSON.parse(v);}
      v=sessionStorage.getItem(this._k(k));
      if(v!=null){try{localStorage.setItem(this._k(k),v)}catch(e){}return JSON.parse(v);}
      return d;
    }catch{return d;}
  },
  set(k,v){
    const s=JSON.stringify(v);
    try{localStorage.setItem(this._k(k),s)}catch(e){console.warn('ls full',e)}
    try{sessionStorage.setItem(this._k(k),s)}catch(e){}
  },
  del(k){localStorage.removeItem(this._k(k));sessionStorage.removeItem(this._k(k));},
  uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)},
  test(){try{const t='_t'+Date.now();localStorage.setItem(t,'1');const ok=localStorage.getItem(t)==='1';localStorage.removeItem(t);return ok;}catch{return false;}}
};

// ── HELPERS ────────────────────────────────────────────────────────────
function getSt(p){
  if(!p.due)return'ok';
  const d=Math.floor((new Date(p.due)-Date.now())/864e5);
  return d>30?'ok':d>7?'soon':d>=0?'urgent':p.legal&&Math.abs(d)>7?'critical':'overdue';
}
function daysLabel(due){
  const d=Math.floor((new Date(due)-Date.now())/864e5);
  return d<0?Math.abs(d)+' T überfällig':d===0?'Heute!':'in '+d+' T';
}
function fileToB64(file){return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(file)})}
function uid(){return DB.uid()}
function h(tag,props={},children=[]){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(props)){
    if(k==='cls')el.className=v;
    else if(k==='html')el.innerHTML=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of [children].flat(99)){
    if(c==null||c===false||c===undefined)continue;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  }
  return el;
}
const div=(p,c)=>h('div',p,c);
const span=(p,c)=>h('span',p,c);
const img=(p)=>h('img',p);
function badge(col,text){const b=span({cls:'bdg'});b.style.background=col+'22';b.style.color=col;b.textContent=text;return b;}
function btn(label,cls,onClick,disabled=false){const b=h('button',{cls:'btn '+cls,onclick:onClick},label);if(disabled)b.disabled=true;return b;}
function card(style={}){const c=div({cls:'card'});Object.assign(c.style,style);return c;}
function field(label,value,onChange,opts={}){
  const wrap=div({});
  if(label)wrap.appendChild(h('label',{cls:'fl'},label));
  let inp;
  if(opts.options){
    inp=h('select');
    for(const[v,l]of opts.options){const o=h('option',{value:v},l);if(v==value)o.selected=true;inp.appendChild(o);}
    inp.addEventListener('change',()=>onChange(inp.value));
  }else if(opts.textarea){
    inp=h('textarea',{placeholder:opts.ph||''});inp.value=value||'';inp.addEventListener('input',()=>onChange(inp.value));
  }else{
    inp=h('input',{type:opts.type||'text',placeholder:opts.ph||''});inp.value=value||'';inp.addEventListener('input',()=>onChange(inp.value));
  }
  wrap.appendChild(inp);
  if(opts.mb!==false)wrap.style.marginBottom='13px';
  return{wrap,inp};
}

// ── PHOTO PICKER ───────────────────────────────────────────────────────
function photoPicker(container,photos,onChange,max=8){
  function redrawPicker(){
    container.innerHTML='';
    const wrap=div({style:{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'flex-start'}});
    for(let i=0;i<photos.length;i++){
      const tw=div({cls:'thumb-wrap'});
      tw.appendChild(img({src:photos[i],style:{width:'100%',height:'100%',objectFit:'cover',borderRadius:'10px',border:'1px solid #E8EDF4'}}));
      const del=div({cls:'thumb-del',onclick:()=>{photos.splice(i,1);onChange([...photos]);render()}},'×');
      tw.appendChild(del);wrap.appendChild(tw);
    }
    if(photos.length<max){
      const addBtn=div({cls:'thumb-add',onclick:()=>inp.click()});
      addBtn.appendChild(span({style:{fontSize:'24px'}},'📷'));
      addBtn.appendChild(span({style:{fontSize:'9px',color:CLR.t2,fontWeight:'700'}},'Foto'));
      wrap.appendChild(addBtn);
    }
    const inp=h('input',{type:'file',accept:'image/*',multiple:'true',style:{display:'none'}});
    inp.setAttribute('capture','environment');
    inp.addEventListener('change',async e=>{
      const files=[...e.target.files];
      const b64s=await Promise.all(files.map(fileToB64));
      const merged=[...photos,...b64s].slice(0,max);
      merged.forEach((_,i)=>photos[i]=merged[i]);photos.length=merged.length;
      onChange([...photos]);redrawPicker();e.target.value='';
    });
    wrap.appendChild(inp);
    container.appendChild(wrap);
    container.appendChild(div({style:{fontSize:'10px',color:CLR.t3,marginTop:'4px'}},photos.length+'/'+max+' Fotos'));
  }
  render();
}

// ── AI ─────────────────────────────────────────────────────────────────
async function callAI(content,key,prov,isPhoto=false){
  const jsonPrompt=`Du bist TGA-Experte${isPhoto?' mit OCR':''}.${isPhoto?' Analysiere dieses Bild einer technischen Anlage oder eines Typenschilds. Extrahiere alle erkennbaren Daten per OCR.':' Analysiere: "'+content+'"'}\nAntworte NUR mit JSON (kein Markdown):\n{"assetType":"HVAC_HEATING|PUMP|HVAC_VENT|ELEC_DIST|FIRE_PROT|VALVE|SENSOR|OTHER","name":"string","manufacturer":"string|null","model":"string|null","serial":"string|null","year":number|null,"powerKw":number|null,"confidence":0-100,"ocrText":"string|null","maintenanceRules":[{"title":"string","norm":"string","intervalDays":number,"isLegal":boolean,"responsible":"string"}],"notes":"string"}`;
  if(prov==='openai'){
    const msgContent=isPhoto?[{type:'image_url',image_url:{url:content,detail:'high'}},{type:'text',text:jsonPrompt}]:[{type:'text',text:jsonPrompt}];
    const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+key},body:JSON.stringify({model:'gpt-4o',max_tokens:1500,messages:[{role:'user',content:msgContent}]})});
    if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.status)}
    return(await r.json()).choices[0].message.content;
  }
  const msgContent=isPhoto?[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:content.replace(/^data:image\/\w+;base64,/,'')}},{type:'text',text:jsonPrompt}]:[{type:'text',text:jsonPrompt}];
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:msgContent}]})});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.status)}
  return(await r.json()).content[0].text;
}

  // ── PDF TO IMAGE ────────────────────────────────────────────────────
  async function pdfToImage(file){
    // For images: just convert directly
    if(file.type.startsWith('image/')){
      return fileToB64(file);
    }
    // For PDF: try PDF.js, fallback to placeholder
    return new Promise((resolve)=>{
      const placeholder='data:image/svg+xml,'+encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">'+
        '<rect width="300" height="400" fill="#1C2A3E"/>'+
        '<rect x="40" y="40" width="220" height="280" rx="8" fill="#253650" stroke="#00D4FF" stroke-width="1.5"/>'+
        '<text x="150" y="130" text-anchor="middle" font-size="48">📄</text>'+
        '<text x="150" y="185" text-anchor="middle" font-size="16" fill="#EEF2FF" font-weight="bold">PDF Grundriss</text>'+
        '<text x="150" y="210" text-anchor="middle" font-size="12" fill="#7A90B8">Vorschau nicht verfügbar</text>'+
        '<text x="150" y="230" text-anchor="middle" font-size="11" fill="#3D5070">Datei gespeichert ✓</text>'+
        '</svg>'
      );
      const fr=new FileReader();
      fr.onerror=()=>resolve(placeholder);
      fr.onload=async(e)=>{
        try{
          const arr=new Uint8Array(e.target.result);
          const loadPdf=async()=>{
            const pdf=await window.pdfjsLib.getDocument({data:arr}).promise;
            const page=await pdf.getPage(1);
            const vp=page.getViewport({scale:2.0});
            const canvas=document.createElement('canvas');
            canvas.width=vp.width;canvas.height=vp.height;
            await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
            return canvas.toDataURL('image/jpeg',0.88);
          };
          if(window.pdfjsLib){
            resolve(await loadPdf());
          }else{
            const script=document.createElement('script');
            script.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
            script.onload=async()=>{
              window.pdfjsLib.GlobalWorkerOptions.workerSrc=
                'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
              try{resolve(await loadPdf());}catch(e2){resolve(placeholder);}
            };
            script.onerror=()=>resolve(placeholder);
            document.head.appendChild(script);
          }
        }catch(err){resolve(placeholder);}
      };
      fr.readAsArrayBuffer(file);
    });
  }

  // ── GEFÜHRTER RUNDGANG ──────────────────────────────────────────────
  function startGuidedTour(rooms){
    const pending=rooms.filter(r=>!r.scanDone);
    if(!pending.length){buildTabContent();return;}
    let tourIdx=0;
    showTourRoom(pending,tourIdx);
  }

  function showTourRoom(rooms,idx){
    const room=rooms[idx];
    if(!room){buildTabContent();return;}
    const total=rooms.length;
    const apiKey=DB.get('apiKey',''),provider=DB.get('provider','claude');

    hrow.appendChild(h('strong',{style:{fontSize:'14px',color:CLR.t1}},'🚶 Rundgang: '+room.name));

    box.appendChild(mhdr);

    const mbody=div({cls:'modal-body'});
    box.appendChild(mbody);ov.appendChild(box);document.body.appendChild(ov);

    // ── FLOORPLAN: fixed section, never destroyed by renderTourBody ──
    let _fpRot=0;
    const fpSrc=(b.floorplans&&b.floorplans['EG'])||b.floorplan;
    let _fpImg=null; // keep reference for rotation
    if(fpSrc){

      const pin=div({style:{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',pointerEvents:'none'}});
      pin.innerHTML='<div style="position:relative;width:28px;height:28px;display:flex;align-items:center;justify-content:center">'+
        '<div style="position:absolute;width:28px;height:28px;border-radius:50%;background:rgba(0,212,255,.25);animation:pulse 1.5s ease-in-out infinite"></div>'+
        '<div style="width:14px;height:14px;border-radius:50%;background:#00D4FF;border:2px solid #fff;box-shadow:0 0 8px rgba(0,212,255,.8);z-index:1"></div>'+
        '<div style="position:absolute;bottom:-18px;white-space:nowrap;font-size:9px;font-weight:800;color:#00D4FF;text-shadow:0 1px 3px rgba(0,0,0,.8);background:rgba(0,0,0,.6);padding:1px 5px;border-radius:4px">'+room.name+'</div>'+
        '</div>';

      lighting_type:'',lighting_count:0,lighting_condition:'gut',

    function renderTourBody(){
      mContent.innerHTML='';  // only clear dynamic section, NOT the floorplan!

      if(step==='capture'){

    function renderCapture(){
      mContent.appendChild(div({style:{fontSize:'12px',color:CLR.t2,marginBottom:'12px'}},'Fotografiere "'+room.name+'" aus verschiedenen Winkeln. KI erfasst dann alles automatisch.'));

      if(photos.length<10){

        addPh.appendChild(span({style:{fontSize:'28px'}},'📷'));

      mContent.appendChild(grid);
      if(photos.length===0){
        const g=div({style:{background:CLR.bg4,borderRadius:'10px',padding:'10px 12px',marginBottom:'12px'}});
        g.appendChild(div({style:{fontSize:'10px',fontWeight:'800',color:CLR.t1,marginBottom:'6px'}},'📷 Tipps für '+room.name+':'));
        [['1.','Gesamtübersicht (vom Eingang)'],['2.','Decke & Beleuchtung'],['3.','Boden & Wände'],['4.','Fenster & Türen'],['5.','Sicherheitsausstattung']].forEach(([n,t])=>{
          const row=div({style:{display:'flex',gap:'6px',fontSize:'10px',color:CLR.t2,marginBottom:'3px'}});
          row.appendChild(span({style:{fontWeight:'800',color:CLR.p,width:'14px'}},n));row.appendChild(span({},t));g.appendChild(row);
        });
        mContent.appendChild(g);
      }
      const btns=div({style:{display:'flex',gap:'8px',flexWrap:'wrap'}});
      btns.appendChild(btn('Überspringen','btn-ghost btn-sm',()=>skipRoom()));
      if(photos.length>0){
        if(apiKey)btns.appendChild(btn('🧠 KI-Analyse ('+photos.length+'📷)','btn-pri',()=>runRoomScan()));
        btns.appendChild(btn('✏️ Manuell ausfüllen','btn-sec btn-sm',()=>{step='equipment';renderTourBody();}));
      }else{
        btns.appendChild(btn('📷 Foto aufnehmen','btn-pri',()=>tourFileInp.click()));
        btns.appendChild(btn('✏️ Manuell','btn-ghost btn-sm',()=>{step='equipment';renderTourBody();}));

    function renderEquipmentForm(){
      // ── AUSSTATTUNG ──
      const sec=(title,children)=>{

        s.appendChild(div({style:{fontSize:'11px',fontWeight:'800',color:CLR.t1,marginBottom:'10px'}},title));

        cb.addEventListener('change',()=>eq[key]=cb.checked);
        wrap.appendChild(cb);wrap.appendChild(span({style:{fontSize:'12px',color:CLR.t1}},label));

        wrap.appendChild(inp);return wrap;
      };

      if(scanResult){

      // Boden
      mContent.appendChild(sec('🪵 Boden & Wände',[
        field('Bodenbelag',eq.floor_type,v=>eq.floor_type=v,{options:[['','Wählen...'],['Parkett','Parkett'],['Laminat','Laminat'],['Teppich','Teppich'],['Fliesen','Fliesen'],['Beton','Beton'],['Linoleum','Linoleum'],['PVC','PVC'],['Andere','Andere']],mb:false}).wrap,
        field('Zustand Boden',eq.floor_condition,v=>eq.floor_condition=v,{options:[['gut','✅ Gut'],['mittel','⚠️ Mittel'],['schlecht','❌ Schlecht']],mb:false}).wrap,
        field('Deckentyp',eq.ceiling_type,v=>eq.ceiling_type=v,{options:[['','Wählen...'],['Putz','Putz'],['Akustikdecke','Akustikdecke'],['Abgehängt','Abgehängt'],['Betondecke','Betondecke'],['Andere','Andere']],mb:false}).wrap,
        field('Zustand Wände',eq.wall_condition,v=>eq.wall_condition=v,{options:[['gut','✅ Gut'],['mittel','⚠️ Mittel'],['schlecht','❌ Schlecht']],mb:false}).wrap,
      ]));

      // Fenster & Türen
      mContent.appendChild(sec('🪟 Fenster & Türen',[
        numRow('Anzahl Fenster','windows'),
        numRow('Anzahl Türen','doors'),
        field('Fenstertyp',eq.window_type,v=>eq.window_type=v,{options:[['','Wählen...'],['Einfach','Einfachverglasung'],['Doppel','Doppelverglasung'],['Dreifach','Dreifachverglasung']],mb:false}).wrap,
        field('Zustand Fenster',eq.window_condition,v=>eq.window_condition=v,{options:[['gut','✅ Gut'],['mittel','⚠️ Mittel'],['schlecht','❌ Schlecht']],mb:false}).wrap,

      // Beleuchtung
      mContent.appendChild(sec('💡 Beleuchtung',[

        numRow('Anzahl Leuchten','lighting_count'),
        field('Zustand Beleuchtung',eq.lighting_condition,v=>eq.lighting_condition=v,{options:[['gut','✅ Gut'],['mittel','⚠️ Mittel'],['schlecht','❌ Schlecht']],mb:false}).wrap,
      ]));

      // Sicherheit
      mContent.appendChild(sec('🚨 Sicherheit & Notfall',[

        chk('🩹 Verbandskasten','first_aid'),

      const btns=div({style:{display:'flex',gap:'8px',flexWrap:'wrap',paddingBottom:'8px'}});
      btns.appendChild(btn('← Zurück','btn-ghost btn-sm',()=>{step='capture';renderTourBody();}));
      btns.appendChild(btn('✓ Raum speichern & weiter','btn-pri',()=>saveRoomAndNext()));
      mContent.appendChild(btns);

    async function runRoomScan(){
      if(!apiKey)return;
      step='scanning';renderTourBody();
      try{
        const prompt=`Du bist Facility Manager. Analysiere diese ${photos.length} Raum-Fotos von "${room.name}".
Antworte NUR mit validem JSON:
{"area_m2":Zahl_oder_null,"height_m":Zahl_oder_null,"floor_type":"Parkett|Laminat|Teppich|Fliesen|Beton|Linoleum|PVC|andere|null","floor_condition":"gut|mittel|schlecht","ceiling_type":"Putz|Akustikdecke|Abgehängt|Betondecke|andere|null","wall_condition":"gut|mittel|schlecht","windows":Zahl,"window_type":"Einfach|Doppel|Dreifach|null","window_condition":"gut|mittel|schlecht","doors":Zahl,"lighting_type":"LED|Leuchtstoffröhre|Halogen|Glühbirne|Gemischt|null","lighting_count":Zahl,"lighting_condition":"gut|mittel|schlecht","escape_route":bool,"escape_route_sign":bool,"defi":bool,"first_aid":bool,"fire_ext":Zahl,"fire_detector":Zahl,"technical_assets":[{"type":"HVAC_HEATING|PUMP|HVAC_VENT|ELEC_DIST|FIRE_PROT|VALVE|SENSOR|OTHER","name":"string","details":"string"}]}`;
        let msgContent;
        if(provider==='openai'){
          msgContent=photos.map(p=>({type:'image_url',image_url:{url:p,detail:'high'}}));
          msgContent.push({type:'text',text:prompt});
          const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+apiKey},body:JSON.stringify({model:'gpt-4o',max_tokens:1500,messages:[{role:'user',content:msgContent}]})});
          scanResult=JSON.parse((await r.json()).choices[0].message.content.replace(/```json?|```/g,'').trim());
        }else{
          msgContent=photos.map(p=>({type:'image',source:{type:'base64',media_type:'image/jpeg',data:p.replace(/^data:image\/\w+;base64,/,'')}}));
          msgContent.push({type:'text',text:prompt});
          const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'content-type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:msgContent}]})});
          scanResult=JSON.parse((await r.json()).content[0].text.replace(/```json?|```/g,'').trim());
        }
        // Merge scan into eq
        Object.keys(eq).forEach(k=>{if(scanResult[k]!=null)eq[k]=scanResult[k];});
        step='equipment';renderTourBody();
      }catch(e){alert('Fehler: '+e.message);step='capture';renderTourBody();}
    }

    function saveRoomAndNext(){
      // Save room with equipment
      const rooms=DB.get('rooms',[]);
      const idx2=rooms.findIndex(r=>r.id===room.id);
      const updated={...room,equipment:eq,photos:[...photos],area:eq.area,height_m:eq.height_m,scanDone:true,scannedAt:new Date().toISOString()};
      if(idx2>=0)rooms[idx2]=updated;else rooms.push(updated);
      DB.set('rooms',rooms);
      // Save detected assets
      if(scanResult?.technical_assets?.length){
        const assets=DB.get('assets',[]);
        scanResult.technical_assets.forEach(a=>assets.push({id:uid(),rid:room.id,bid:bid,cat:'TECHNICAL',type:a.type,name:a.name,mfr:'',model:a.details||'',serial:'',year:null,kw:null,photos:[]}));
        DB.set('assets',assets);
      }
      // Safety items from eq
      const safetyItems=[];
      if(eq.defi)safetyItems.push({cat:'SAFETY',type:'SAFETY',name:'Defibrillator (AED)',mfr:'',model:'',nextCheck:new Date(Date.now()+730*864e5).toISOString().slice(0,10)});
      if(eq.first_aid)safetyItems.push({cat:'SAFETY',type:'SAFETY',name:'Verbandskasten',mfr:'',model:'',nextCheck:new Date(Date.now()+90*864e5).toISOString().slice(0,10)});
      if(eq.fire_ext>0)safetyItems.push({cat:'SAFETY',type:'FIRE_PROT',name:'Feuerlöscher ('+eq.fire_ext+' Stk.)',mfr:'',model:'',nextCheck:new Date(Date.now()+365*864e5).toISOString().slice(0,10)});
      if(safetyItems.length){
        const assets=DB.get('assets',[]);
        safetyItems.forEach(a=>assets.push({id:uid(),rid:room.id,bid:bid,...a,serial:'',year:null,kw:null,photos:[]}));
        DB.set('assets',assets);
      }
      ov.remove();
      // Next room
      const allRooms=DB.get('rooms',[]).filter(r=>r.bid===bid&&!r.scanDone);
      if(allRooms.length>0)startGuidedTour(allRooms);
      else{
        // Tour complete!
        modal('🎉 Rundgang abgeschlossen!',(body,close)=>{
          body.appendChild(div({style:{textAlign:'center',padding:'20px 0'}}));
          body.lastChild.appendChild(div({style:{fontSize:'48px',marginBottom:'12px'}},'🎉'));
          body.lastChild.appendChild(div({style:{fontSize:'16px',fontWeight:'800',color:CLR.t1,marginBottom:'6px'}},'Alle Räume erfasst!'));
          const br2=DB.get('rooms',[]).filter(r=>r.bid===bid);
          body.lastChild.appendChild(div({style:{fontSize:'12px',color:CLR.t2,marginBottom:'16px'}},br2.length+' Räume · '+DB.get('assets',[]).filter(a=>a.bid===bid).length+' Anlagen erfasst'));
          const bb=div({style:{display:'flex',gap:'8px',justifyContent:'center'}});
          bb.appendChild(btn('✓ Fertig','btn-pri',()=>{close();setTab('rooms');}));
          body.lastChild.appendChild(bb);
        });
      }
    }

    function skipRoom(){
      const rooms2=DB.get('rooms',[]);
      const i2=rooms2.findIndex(r=>r.id===room.id);
      if(i2>=0){rooms2[i2]={...rooms2[i2],scanDone:true,skipped:true};DB.set('rooms',rooms2);}
      ov.remove();
      const allRooms=DB.get('rooms',[]).filter(r=>r.bid===bid&&!r.scanDone);
      if(allRooms.length>0)startGuidedTour(allRooms);
      else buildTabContent();
    }

    const tourFileInp=h('input',{type:'file',accept:'image/*',multiple:'true',style:{display:'none'}});
    tourFileInp.setAttribute('capture','environment');
    tourFileInp.addEventListener('change',async e=>{
      const files=[...e.target.files];
      const b64s=await Promise.all(files.map(fileToB64));
      photos=[...photos,...b64s].slice(0,10);e.target.value='';renderTourBody();
    });
    document.body.appendChild(tourFileInp);
    // Cleanup on close
    const origClose=()=>{tourFileInp.remove();ov.remove();buildTabContent();};
    box.querySelector('button').addEventListener('click',origClose);

    renderTourBody();
  }

  // ── ROOMS TAB ───────────────────────────────────────────────────────

// ── ROOM DETAIL ─────────────────────────────────────────────────────────
function pageRoomDetail(bid,rid){
  const r=DB.get('rooms',[]).find(x=>x.id===rid);
  if(!r){state.roomDetail=null;return pageBuildingDetail(bid);}
  const plans=DB.get('plans',[]);
  const rAssets=DB.get('assets',[]).filter(a=>a.rid===rid);
  const eq=r.equipment||{};
  const condCol={'gut':CLR.ok,'mittel':CLR.wrn,'schlecht':CLR.dan,'renovierungsbedürftig':CLR.crit};

  const root=div({cls:'page'});
  const hero=div({style:{background:`linear-gradient(135deg,${CLR.p},${CLR.p2})`,padding:'14px 16px 18px'}});
  const back=btn('← Zurück','btn-sm',()=>{state.roomDetail=null;state.bldTab='rooms';render();});
  back.style.cssText='background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:12px;display:inline-flex;align-items:center;font-family:inherit';
  hero.appendChild(back);
  hero.appendChild(div({style:{fontSize:'20px',fontWeight:'800',color:'#fff',marginBottom:'2px'}},r.name||'Raum'));
  const meta=[];
  if(r.area)meta.push('📐 '+r.area+'m²');
  if(r.height_m)meta.push('↕ '+r.height_m+'m');
  if(r.floor!=null)meta.push('🪜 '+r.floor+'.OG');
  hero.appendChild(div({style:{fontSize:'11px',color:'rgba(255,255,255,.5)'}},meta.join(' · ')||'Keine Maße'));
  const stRow=div({style:{display:'flex',gap:'6px',marginTop:'8px',flexWrap:'wrap'}});
  if(!r.scanDone)stRow.appendChild(badge(CLR.wrn,'⏳ Nicht gescannt'));
  else if(r.skipped)stRow.appendChild(badge(CLR.t3,'⏭ Übersprungen'));
  else stRow.appendChild(badge(CLR.ok,'✅ Vollständig erfasst'));
  if(eq.overall_condition){const cc=condCol[eq.overall_condition]||CLR.t2;stRow.appendChild(badge(cc,eq.overall_condition));}
  hero.appendChild(stRow);root.appendChild(hero);

  const wrap=div({style:{padding:'14px'}});

  // Photos
  if(r.photos&&r.photos.length){
    const ps=card({padding:'12px',marginBottom:'12px'});
    ps.appendChild(div({style:{fontSize:'12px',fontWeight:'800',color:CLR.t1,marginBottom:'8px'}},'📷 Fotos ('+r.photos.length+')'));
    const pg=div({style:{display:'flex',gap:'8px',flexWrap:'wrap'}});
    r.photos.forEach(function(p,i){var im=document.createElement('img');im.src=p;im.style.cssText='width:72px;height:72px;object-fit:cover;border-radius:8px;cursor:pointer;flex-shrink:0';im.onclick=function(){showLightbox(r.photos,i);};pg.appendChild(im);});
    ps.appendChild(pg);wrap.appendChild(ps);
  }

  // Ausstattung
  const equipCard=card({padding:'14px',marginBottom:'12px'});
  equipCard.appendChild(div({style:{fontSize:'12px',fontWeight:'800',color:CLR.t1,marginBottom:'10px'}},'🏠 Ausstattung'));
  const rows=[
    eq.floor_type&&['🪵 Boden',eq.floor_type+(eq.floor_condition?' ('+eq.floor_condition+')':'')],
    eq.ceiling_type&&['🏔 Decke',eq.ceiling_type+(eq.ceiling_condition?' ('+eq.ceiling_condition+')':'')],
    eq.wall_condition&&['🧱 Wände','Zustand: '+eq.wall_condition],
    eq.windows!=null&&['🪟 Fenster',eq.windows+' Stk.'+(eq.window_type?' · '+eq.window_type:'')+(eq.window_condition?' · '+eq.window_condition:'')],
    eq.doors!=null&&['🚪 Türen',eq.doors+' Stk.'],
    eq.lighting_type&&['💡 Beleuchtung',eq.lighting_type+(eq.lighting_count?' · '+eq.lighting_count+' Stk.':'')+(eq.lighting_condition?' · '+eq.lighting_condition:'')],
  ].filter(Boolean);
  if(rows.length){
    rows.forEach(([k,v])=>{
      const row=div({style:{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid '+CLR.bd,fontSize:'11px'}});
      row.appendChild(span({style:{color:CLR.t2,fontWeight:'600'}},k));
      row.appendChild(span({style:{color:CLR.t1,fontWeight:'700',textAlign:'right',maxWidth:'55%'}},v));
      equipCard.appendChild(row);
    });
  }else{
    equipCard.appendChild(div({style:{fontSize:'11px',color:CLR.t2,textAlign:'center',padding:'8px'}},'Kein Scan – keine Ausstattungsdaten'));
  }
  wrap.appendChild(equipCard);

  // Sicherheit
  const secItems=[];
  if(eq.escape_route)secItems.push(['🏃','Fluchtweg vorhanden',CLR.ok]);
  if(eq.escape_route_sign)secItems.push(['🪧','Fluchtweg-Beschilderung',CLR.ok]);
  if(eq.defi)secItems.push(['💙','Defibrillator (AED)',CLR.acc]);
  if(eq.first_aid)secItems.push(['🩹','Verbandskasten',CLR.ok]);
  if(eq.fire_ext)secItems.push(['🔴','Feuerlöscher: '+eq.fire_ext+' Stk.',CLR.dan]);
  if(eq.fire_detector)secItems.push(['🔊','Brandmelder: '+eq.fire_detector+' Stk.',CLR.dan]);
  if(secItems.length){
    const sc=card({padding:'14px',marginBottom:'12px'});
    sc.appendChild(div({style:{fontSize:'12px',fontWeight:'800',color:CLR.t1,marginBottom:'10px'}},'🚨 Sicherheit'));
    secItems.forEach(([ic,label,col])=>{
      const row=div({style:{display:'flex',alignItems:'center',gap:'8px',padding:'6px 0',borderBottom:'1px solid '+CLR.bd}});
      row.appendChild(span({style:{fontSize:'16px'}},ic));
      row.appendChild(span({style:{fontSize:'11px',color:CLR.t1,fontWeight:'600',flex:'1'}},label));
      row.appendChild(badge(col,'✓'));
      sc.appendChild(row);
    });
    wrap.appendChild(sc);
  }

  // Inventar by category
  const cats=[['TECHNICAL','🔧 Technische Anlagen',CLR.p2],['SAFETY','🚨 Sicherheit',CLR.dan],['OTHER','📦 Sonstiges',CLR.t2]];
  cats.forEach(([catKey,catLabel,catCol])=>{
    const ca=rAssets.filter(a=>(a.cat||'TECHNICAL')===catKey);
    if(!ca.length)return;
    const ic=card({padding:'14px',marginBottom:'12px'});
    ic.appendChild(div({style:{fontSize:'12px',fontWeight:'800',color:catCol,marginBottom:'10px'}},catLabel+' ('+ca.length+')'));
    ca.forEach(a=>{
      const ap=plans.filter(p=>p.aid===a.id);
      const stKey=ap.length?ap.reduce((w,p)=>{const s=getSt(p);const o=['ok','soon','urgent','overdue','critical'];return o.indexOf(s)>o.indexOf(w)?s:w},'ok'):'ok';
      const col=SC[stKey];
      const ar=div({style:{display:'flex',gap:'10px',alignItems:'center',padding:'7px 0',borderBottom:'1px solid '+CLR.bd}});
      ar.appendChild(div({style:{width:'32px',height:'32px',borderRadius:'8px',background:col+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'15px',flexShrink:'0'}},EM[a.type]||'🏭'));
      const ai=div({style:{flex:'1'}});
      ai.appendChild(div({style:{fontSize:'12px',fontWeight:'700',color:CLR.t1}},a.name));
      if(a.mfr||a.model)ai.appendChild(div({style:{fontSize:'10px',color:CLR.t2}},(a.mfr||'')+(a.model?' · '+a.model:'')));
      ar.appendChild(ai);
      ar.appendChild(badge(col,ap.length+' Pläne'));
      ic.appendChild(ar);
    });
    wrap.appendChild(ic);
  });
  if(!rAssets.length){
    const ec=card({padding:'14px',marginBottom:'12px'});
    ec.appendChild(div({style:{fontSize:'12px',fontWeight:'800',color:CLR.t1,marginBottom:'6px'}},'🔧 Inventar'));
    ec.appendChild(div({style:{fontSize:'11px',color:CLR.t2,textAlign:'center',padding:'8px'}},'Keine Anlagen in diesem Raum'));
    wrap.appendChild(ec);
  }

  if(r.scannedAt){
    wrap.appendChild(div({style:{fontSize:'10px',color:CLR.t3,textAlign:'center',marginBottom:'12px'}},'KI-Scan: '+new Date(r.scannedAt).toLocaleDateString('de-DE')));
  }
  const delBtn=btn('🗑️ Raum löschen','btn-sec',()=>{
    if(!confirm('Raum löschen?'))return;
    DB.set('rooms',DB.get('rooms',[]).filter(x=>x.id!==rid));
    state.roomDetail=null;state.bldTab='rooms';render();
  });
  delBtn.style.cssText+='width:100%;justify-content:center;border-radius:12px;padding:12px;';
  wrap.appendChild(delBtn);
  root.appendChild(wrap);
  return root;
}

  const hrow=div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}});
  hrow.appendChild(div({style:{fontSize:'20px',fontWeight:'800',color:CLR.t1}},'Wartungsplan'));
  hrow.appendChild(btn('＋ Plan','btn-pri btn-sm',()=>showPlanForm(null)));
  sticky.appendChild(hrow);
  const fbar=div({cls:'fbar',style:{paddingBottom:'12px'}});
  sticky.appendChild(fbar);root.appendChild(sticky);

  const sumBar=div({style:{background:'linear-gradient(120deg,#04080F,#0A1828)',margin:'14px 14px 10px',borderRadius:'14px',padding:'13px 14px',display:'flex'}});
  root.appendChild(sumBar);
  const listWrap=div({style:{padding:'0 14px',display:'flex',flexDirection:'column',gap:'8px'}});
  root.appendChild(listWrap);

  function refresh(){plans=DB.get('plans',[]);buildTabs();buildSum();buildList();}

  function buildTabs(){
    fbar.innerHTML='';
    const sum=plans.reduce((a,p)=>{const s=getSt(p);a[s]=(a[s]||0)+1;return a},{});
    const act=(sum.critical||0)+(sum.overdue||0)+(sum.urgent||0);
    const tabs=[['all','Alle ('+plans.length+')'],['action','⚡ Aktion ('+act+')'],['critical','🟣 Kritisch'],['overdue','🔴 Überfällig'],['urgent','🟠 Dringend'],['soon','🟡 Bald'],['ok','✅ OK'],['legal','⚖ Gesetzlich']];
    for(const[k,l]of tabs){
      const b=h('button',{cls:'fchip',onclick:()=>{filt=k;buildTabs();buildList();}},l);
      b.style.background=filt===k?CLR.p:CLR.bg4;b.style.color=filt===k?CLR.bg:CLR.t2;
      fbar.appendChild(b);
    }
  }

  function buildSum(){
    sumBar.innerHTML='';
    const sum=plans.reduce((a,p)=>{const s=getSt(p);a[s]=(a[s]||0)+1;return a},{});
    [['critical','#FF8A8A','Kritisch'],['overdue','#FFB347','Überfällig'],['urgent','#FFD966','Dringend'],['ok','#7EDB9E','OK']].forEach(([k,col,l])=>{
      const c=div({style:{flex:'1',textAlign:'center'}});
      c.appendChild(div({style:{fontSize:'20px',fontWeight:'800',color:col,lineHeight:'1'}},sum[k]||0));
      c.appendChild(div({style:{fontSize:'9px',color:'rgba(255,255,255,.45)',fontWeight:'700',textTransform:'uppercase',marginTop:'2px'}},l));
      sumBar.appendChild(c);
    });
  }

  function buildList(){
    listWrap.innerHTML='';
    const filtered=plans.filter(p=>{
      const s=getSt(p);
      if(filt==='all')return true;
      if(filt==='action')return['critical','overdue','urgent'].includes(s);
      if(filt==='legal')return p.legal;
      return s===filt;
    }).sort((a,b)=>new Date(a.due)-new Date(b.due));

    if(!filtered.length){
      const e=card({padding:'40px',textAlign:'center'});
      e.appendChild(div({style:{fontSize:'36px',marginBottom:'10px'}},'✅'));
      e.appendChild(div({style:{fontSize:'14px',fontWeight:'700',color:CLR.t1}},'Keine Einträge'));
      listWrap.appendChild(e);
    }
    for(const p of filtered){
      const s=getSt(p),col=SC[s],d=Math.floor((new Date(p.due)-Date.now())/864e5);
      const a=assets.find(x=>x.id===p.aid);
      const row=card({padding:'12px 13px',display:'flex',gap:'9px',alignItems:'center',marginBottom:'2px'});
      row.appendChild(div({style:{width:'3px',alignSelf:'stretch',borderRadius:'2px',background:col,flexShrink:'0'}}));
      const thumb=a?.photos?.[0]?img({src:a.photos[0],style:{width:'36px',height:'36px',objectFit:'cover',borderRadius:'9px',flexShrink:'0'}}):div({style:{width:'36px',height:'36px',borderRadius:'9px',background:col+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',flexShrink:'0'}},EM[a?.type]||'🔧');
      row.appendChild(thumb);
      const info=div({style:{flex:'1',minWidth:'0',cursor:'pointer'},onclick:()=>showPlanDetail(p)});
      const titleRow=div({style:{display:'flex',alignItems:'center',gap:'5px'}});
      titleRow.appendChild(div({style:{fontSize:'12px',fontWeight:'700',color:CLR.t1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.title));
      if(p.legal)titleRow.appendChild(badge(CLR.dan,'§'));
      info.appendChild(titleRow);
      info.appendChild(div({style:{fontSize:'10px',color:CLR.t2,marginTop:'1px'}},(a?.name||'Unbekannte Anlage')+' · '+p.norm));
      const brow=div({style:{marginTop:'4px',display:'flex',gap:'4px',flexWrap:'wrap'}});
      brow.appendChild(badge(col,d<0?Math.abs(d)+' T überfällig':d===0?'Heute!':'in '+d+' T'));
      if(p.who)brow.appendChild(badge(CLR.t3,p.who.slice(0,15)));
      info.appendChild(brow);
      row.appendChild(info);
      // Action buttons
      const acts=div({style:{display:'flex',gap:'4px',flexShrink:'0'}});
      const chk=btn('✓','',()=>showRecord(p));
      chk.style.cssText='background:'+CLR.ok+'22;border:1px solid '+CLR.ok+'44;border-radius:8px;cursor:pointer;padding:7px 10px;font-size:14px;flex-shrink:0;color:'+CLR.ok;
      const edit=btn('✏️','',()=>showPlanForm(p));
      edit.style.cssText='background:'+CLR.sf+';border:1px solid '+CLR.bd+';border-radius:8px;cursor:pointer;padding:7px 8px;font-size:12px;flex-shrink:0';
      acts.appendChild(chk);acts.appendChild(edit);
      row.appendChild(acts);
      listWrap.appendChild(row);
    }
    listWrap.appendChild(div({style:{height:'20px'}}));
  }

  function showPlanDetail(p){
    const a=assets.find(x=>x.id===p.aid);
    const records=DB.get('records',[]).filter(r=>r.planId===p.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const s=getSt(p),col=SC[s];
    modal('Wartungsplan-Details',(body,close)=>{
      // Header info
      const hc=card({padding:'12px',marginBottom:'14px'});
      hc.appendChild(div({style:{fontSize:'13px',fontWeight:'800',color:CLR.t1,marginBottom:'4px'}},p.title));
      hc.appendChild(div({style:{fontSize:'11px',color:CLR.t2}},p.norm+(p.legal?' · ⚖ Gesetzlich':'')));
      const dg=div({cls:'g3',style:{marginTop:'10px'}});
      [[daysLabel(p.due),'Fällig'],[p.days+' Tage','Intervall'],[p.who||'–','Zuständig']].forEach(([v,l])=>{
        const dc=div({style:{background:CLR.bg4,borderRadius:'8px',padding:'8px',textAlign:'center'}});
        dc.appendChild(div({style:{fontSize:'12px',fontWeight:'800',color:CLR.p,wordBreak:'break-word'}},v));
        dc.appendChild(div({style:{fontSize:'8px',color:CLR.t2,fontWeight:'600',marginTop:'1px'}},l));
        dg.appendChild(dc);
      });
      hc.appendChild(dg);body.appendChild(hc);
      // History
      body.appendChild(div({style:{fontSize:'12px',fontWeight:'800',color:CLR.t1,marginBottom:'8px'}},'📋 Wartungshistorie ('+records.length+')'));
      if(records.length){
        records.slice(0,5).forEach(r=>{
          const rc=div({style:{display:'flex',gap:'8px',padding:'8px 10px',background:CLR.bg4,borderRadius:'8px',marginBottom:'6px',alignItems:'center'}});
          rc.appendChild(div({style:{fontSize:'16px'}},r.result==='OK'?'✅':r.result==='DEFECT'?'⚠️':'🔶'));
          const ri=div({style:{flex:'1'}});
          ri.appendChild(div({style:{fontSize:'11px',fontWeight:'700',color:CLR.t1}},r.performer));
          ri.appendChild(div({style:{fontSize:'10px',color:CLR.t2}},new Date(r.date).toLocaleDateString('de-DE')+(r.notes?' · '+r.notes:'')));
          rc.appendChild(ri);body.appendChild(rc);
        });
      }else{
        body.appendChild(div({style:{fontSize:'11px',color:CLR.t2,textAlign:'center',padding:'12px'}},'Noch keine Wartungen durchgeführt'));
      }
      const btns=div({style:{display:'flex',gap:'8px',marginTop:'14px'}});
      btns.appendChild(btn('✏️ Bearbeiten','btn-ghost btn-sm',()=>{close();showPlanForm(p);}));
      btns.appendChild(btn('🗑️ Löschen','btn-ghost btn-sm',()=>{if(!confirm('Plan löschen?'))return;DB.set('plans',DB.get('plans',[]).filter(x=>x.id!==p.id));close();refresh();}));
      btns.appendChild(btn('✓ Abschließen','btn-pri btn-sm',()=>{close();showRecord(p);}));
      body.appendChild(btns);
    });
  }

  function showPlanForm(existing){
    const allAssets=DB.get('assets',[]);
    let p=existing?{...existing}:{id:uid(),aid:'',title:'',norm:'',days:365,legal:false,due:new Date().toISOString().slice(0,10),who:''};
    modal(existing?'Plan bearbeiten':'Neuer Wartungsplan',(body,close)=>{
      if(allAssets.length){
        const{wrap:aw}=field('Anlage *',p.aid,v=>p.aid=v,{options:[['','Anlage wählen...'],...allAssets.map(a=>[a.id,a.name])]});
        body.appendChild(aw);
      }else{
        body.appendChild(div({style:{padding:'10px',background:CLR.wrn+'15',borderRadius:'8px',fontSize:'11px',color:CLR.wrn,marginBottom:'13px'}},'⚠️ Zuerst Anlagen anlegen'));
      }
      const{wrap:tw}=field('Bezeichnung *',p.title,v=>p.title=v,{ph:'Jahreswartung Heizkessel'});
      const{wrap:nw}=field('Norm / Vorschrift',p.norm,v=>p.norm=v,{ph:'DIN EN 12599, DGUV V3...'});
      const g=div({cls:'g2'});
      const{wrap:dw}=field('Intervall (Tage)',p.days,v=>p.days=+v,{type:'number',mb:false});
      const{wrap:duew}=field('Nächste Fälligkeit',p.due,v=>p.due=v,{type:'date',mb:false});
      g.appendChild(dw);g.appendChild(duew);
      const{wrap:ww}=field('Zuständig',p.who,v=>p.who=v,{ph:'Fachbetrieb / Name'});
      // Legal checkbox
      const lrow=div({style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'13px',cursor:'pointer'}});
      const lcb=h('input',{type:'checkbox'});lcb.checked=p.legal;
      lcb.addEventListener('change',()=>p.legal=lcb.checked);
      lrow.appendChild(lcb);
      lrow.appendChild(span({style:{fontSize:'12px',color:CLR.t1}},'⚖ Gesetzlich vorgeschriebene Prüfung'));
      lrow.addEventListener('click',()=>{lcb.checked=!lcb.checked;p.legal=lcb.checked;});
      const btns=div({style:{display:'flex',gap:'8px',justifyContent:'flex-end'}});
      btns.appendChild(btn('Abbrechen','btn-ghost',close));
      btns.appendChild(btn('💾 Speichern','btn-pri btn-sm',()=>{
        if(!p.title.trim())return;
        const cur=DB.get('plans',[]);
        const idx=cur.findIndex(x=>x.id===p.id);
        if(idx>=0)cur[idx]=p;else cur.push(p);
        DB.set('plans',cur);close();refresh();
      }));
      [tw,nw,g,ww,lrow,btns].forEach(el=>body.appendChild(el));
    });
  }

  function showRecord(p){
    let rec={performer:'',result:'OK',notes:''};
    modal('Wartung abschließen',(body,close)=>{
      const info=card({padding:'12px',marginBottom:'14px'});
      info.appendChild(div({style:{fontSize:'13px',fontWeight:'700',color:CLR.t1}},p.title));
      info.appendChild(div({style:{fontSize:'11px',color:CLR.t2,marginTop:'2px'}},p.norm+' · '+(p.who||'')));
      body.appendChild(info);
      const{wrap:pw}=field('Durchgeführt von *',rec.performer,v=>rec.performer=v,{ph:'Name / Firma'});
      const{wrap:rw}=field('Ergebnis',rec.result,v=>rec.result=v,{options:[['OK','✅ Keine Mängel'],['DEFECT','⚠️ Mangel festgestellt'],['PARTIAL','🔶 Teilweise erledigt']]});
      const{wrap:datew}=field('Datum',new Date().toISOString().slice(0,10),v=>rec.date=v,{type:'date'});
      const{wrap:nw}=field('Notizen',rec.notes,v=>rec.notes=v,{textarea:true,ph:'Befunde, Maßnahmen...'});
      const btns=div({style:{display:'flex',gap:'8px',justifyContent:'flex-end'}});
      btns.appendChild(btn('Abbrechen','btn-ghost',close));
      btns.appendChild(btn('✓ Speichern','btn-pri btn-sm',()=>{
        if(!rec.performer.trim())return;
        const recs=[...DB.get('records',[]),{id:uid(),planId:p.id,...rec,date:rec.date||new Date().toISOString()}];
        DB.set('records',recs);
        const u=DB.get('plans',[]).map(x=>x.id!==p.id?x:{...x,done:new Date().toISOString().slice(0,10),due:new Date(Date.now()+x.days*864e5).toISOString().slice(0,10)});
        DB.set('plans',u);close();refresh();
      }));
      [pw,rw,datew,nw,btns].forEach(el=>body.appendChild(el));
    });
  }

  refresh();
  return root;
}

// ── KI SCAN ────────────────────────────────────────────────────────────
function pageScan(){
  const root=div({cls:'page',style:{padding:'0 0 16px'}});
  const apiKey=DB.get('apiKey','');
  const provider=DB.get('provider','claude');
  let mode='photo';
  let scanPhoto=null;
  let textInput='';
  let result=null;
  let isLoading=false;

  const sticky=div({style:{background:CLR.bg2,borderBottom:'1px solid '+CLR.bd,padding:'14px',position:'sticky',top:'0',zIndex:'10',paddingTop:'max(14px,calc(env(safe-area-inset-top,0px) + 8px))'}});
  sticky.appendChild(div({style:{fontSize:'20px',fontWeight:'800',color:CLR.t1,marginBottom:'12px'}},'KI-Scan'));
  const modeBar=div({style:{display:'flex',background:CLR.bg4,borderRadius:'10px',padding:'3px',marginBottom:'0'}});
  const mBtns={};
  [['photo','📷 Foto'],['text','✏️ Text']].forEach(([k,l])=>{
    const b=h('button',{cls:'btn',style:{flex:'1',padding:'8px',fontSize:'12px',borderRadius:'8px',transition:'all .2s'},onclick:()=>{mode=k;updateMode();}},'');
    b.textContent=l;mBtns[k]=b;modeBar.appendChild(b);
  });
  sticky.appendChild(modeBar);root.appendChild(sticky);

  const body=div({style:{padding:'14px'}});
  root.appendChild(body);

  function updateMode(){
    Object.entries(mBtns).forEach(([k,b])=>{
      b.style.background=mode===k?'#fff':'transparent';
      b.style.boxShadow=mode===k?'0 1px 4px rgba(0,0,0,.1)':'none';
      b.style.color=mode===k?CLR.p:CLR.t2;
      b.style.fontWeight=mode===k?'700':'600';
    });
    build();
  }

  function build(){
    body.innerHTML='';
    if(!apiKey){
      const w=div({style:{padding:'12px 14px',background:CLR.wrn+'15',border:'1px solid '+CLR.wrn+'44',borderRadius:'12px',marginBottom:'14px'}});
      w.appendChild(div({style:{fontSize:'12px',fontWeight:'800',color:CLR.wrn,marginBottom:'2px'}},'⚠️ Kein API-Key'));
      w.appendChild(div({style:{fontSize:'11px',color:CLR.t2}},'Bitte in Einstellungen einen API-Key eintragen'));
      const gb=btn('⚙️ Zu Einstellungen','btn-ghost btn-sm',()=>navigate('settings'));gb.style.marginTop='8px';
      w.appendChild(gb);body.appendChild(w);
    }
    if(mode==='photo') buildPhotoMode();
    else buildTextMode();
  }

  let fileInp=null;
  function buildPhotoMode(){
    if(!fileInp){
      fileInp=h('input',{type:'file',accept:'image/*',style:{display:'none'}});
      fileInp.setAttribute('capture','environment');
      fileInp.addEventListener('change',async e=>{
        const f=e.target.files[0];if(!f)return;
        scanPhoto=await fileToB64(f);e.target.value='';result=null;build();
      });
      document.body.appendChild(fileInp);
    }

    if(scanPhoto){
      const ph=div({style:{position:'relative',marginBottom:'14px'}});
      ph.appendChild(img({src:scanPhoto,style:{width:'100%',maxHeight:'240px',objectFit:'contain',borderRadius:'14px',border:'1px solid '+CLR.bd}}));
      const del=div({style:{position:'absolute',top:'8px',right:'8px',background:'rgba(0,0,0,.5)',color:'#fff',borderRadius:'50%',width:'28px',height:'28px',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:'14px'},onclick:()=>{scanPhoto=null;result=null;build();}});
      del.textContent='×';ph.appendChild(del);body.appendChild(ph);
    }else{
      const dropZone=div({style:{border:'2px dashed '+CLR.bd,borderRadius:'16px',padding:'32px 16px',textAlign:'center',cursor:'pointer',background:CLR.bg4,marginBottom:'14px'},onclick:()=>fileInp.click()});
      dropZone.appendChild(div({style:{fontSize:'48px',marginBottom:'12px'}},'📷'));
      dropZone.appendChild(div({style:{fontSize:'14px',fontWeight:'700',color:CLR.t1,marginBottom:'6px'}},'Foto aufnehmen oder hochladen'));
      dropZone.appendChild(div({style:{fontSize:'11px',color:CLR.t2}},'Typenschild · Anlage · Ausstattung'));
      body.appendChild(dropZone);
    }

    if(result) buildResult();
    else if(scanPhoto && !isLoading){
      const btns=div({style:{display:'flex',gap:'8px',marginBottom:'14px'}});
      btns.appendChild(btn('🔄 Anderes Foto','btn-ghost',()=>fileInp.click()));
      btns.appendChild(btn('🧠 KI analysieren','btn-pri',()=>runScan()));
      body.appendChild(btns);
    } else if(isLoading){
      const s=div({style:{textAlign:'center',padding:'24px'}});
      const sp=div({style:{fontSize:'36px',display:'inline-block',animation:'spin 1s linear infinite',marginBottom:'8px'}});sp.textContent='⟳';
      s.appendChild(sp);s.appendChild(div({style:{fontSize:'12px',color:CLR.t2,fontWeight:'700'}},'Analysiere Bild…'));
      body.appendChild(s);
    }
  }

  function buildTextMode(){
    const{wrap:tw,inp:ti}=field('Anlage beschreiben',textInput,v=>textInput=v,{textarea:true,ph:'z.B. Grundfos Umwälzpumpe UPS 25-60, Baujahr 2018',mb:false});
    body.appendChild(tw);
    if(result) buildResult();
    else{
      const sb=btn('🧠 Analysieren','btn-pri',()=>{if(textInput.trim())runScan();});
      sb.style.cssText+='width:100%;margin-top:12px;justify-content:center;padding:13px;border-radius:12px;';
      body.appendChild(sb);
    }
  }

  async function runScan(){
    if(!apiKey){alert('API-Key fehlt');return;}
    isLoading=true;result=null;build();
    try{
      const raw=await callAI(mode==='photo'?scanPhoto:textInput,apiKey,provider,mode==='photo');
      result=JSON.parse(raw.replace(/```json?|```/g,'').trim());
      isLoading=false;build();
    }catch(e){isLoading=false;alert('Fehler: '+e.message);build();}
  }

  function buildResult(){
    if(!result)return;
    const rc=card({padding:'14px',marginBottom:'12px'});
    const rh=div({style:{display:'flex',gap:'12px',alignItems:'flex-start',marginBottom:'12px'}});
    rh.appendChild(div({style:{width:'44px',height:'44px',borderRadius:'11px',background:CLR.p+'15',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'24px',flexShrink:'0'}},EM[result.assetType]||'🏭'));
    const ri=div({});
    ri.appendChild(div({style:{fontSize:'16px',fontWeight:'800',color:CLR.t1}},result.name||'Anlage'));
    ri.appendChild(div({style:{fontSize:'11px',color:CLR.t2,marginTop:'2px'}},TL[result.assetType]||result.assetType));
    ri.appendChild(div({style:{marginTop:'4px'}}));
    ri.lastChild.appendChild(badge(result.confidence>70?CLR.ok:CLR.wrn,result.confidence+'% Konfidenz'));
    rh.appendChild(ri);rc.appendChild(rh);
    const drows=[
      result.manufacturer&&['🏭 Hersteller',result.manufacturer],
      result.model&&['📦 Modell',result.model],
      result.serial&&['🔢 Seriennr.',result.serial],
      result.year&&['📅 Baujahr',result.year],
      result.powerKw&&['⚡ Leistung',result.powerKw+' kW'],
      result.ocrText&&['📝 OCR',result.ocrText.slice(0,60)+(result.ocrText.length>60?'…':'')],
    ].filter(Boolean);
    drows.forEach(([k,v])=>{
      const row=div({style:{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid '+CLR.bd,fontSize:'11px'}});
      row.appendChild(span({style:{color:CLR.t2,fontWeight:'600'}},k));
      row.appendChild(span({style:{color:CLR.t1,fontWeight:'700',textAlign:'right',maxWidth:'55%',wordBreak:'break-all'}},v));
      rc.appendChild(row);
    });
    if(result.notes){rc.appendChild(div({style:{marginTop:'8px',padding:'8px',background:CLR.bg4,borderRadius:'8px',fontSize:'11px',color:CLR.t2}},result.notes));}
    body.appendChild(rc);

    // Maintenance rules
    if(result.maintenanceRules?.length){
      const mc=card({padding:'14px',marginBottom:'12px'});
      mc.appendChild(div({style:{fontSize:'12px',fontWeight:'800',color:CLR.t1,marginBottom:'10px'}},'📋 Wartungsempfehlungen ('+result.maintenanceRules.length+')'));
      result.maintenanceRules.forEach(r=>{
        const mr=div({style:{padding:'8px 0',borderBottom:'1px solid '+CLR.bd}});
        const mh=div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'2px'}});
        mh.appendChild(span({style:{fontSize:'11px',fontWeight:'700',color:CLR.t1}},r.title));
        if(r.isLegal)mh.appendChild(badge(CLR.dan,'§ Pflicht'));
        mr.appendChild(mh);
        mr.appendChild(div({style:{fontSize:'10px',color:CLR.t2}},r.norm+' · alle '+r.intervalDays+' Tage · '+r.responsible));
        mc.appendChild(mr);
      });
      body.appendChild(mc);
    }

    // Save buttons
    const rooms=DB.get('rooms',[]);
    const buildings=DB.get('buildings',[]);
    const saveCard=card({padding:'14px',marginBottom:'12px'});
    saveCard.appendChild(div({style:{fontSize:'12px',fontWeight:'800',color:CLR.t1,marginBottom:'10px'}},'💾 Anlage speichern'));
    let selBid=buildings[0]?.id||'',selRid='';
    if(buildings.length){
      const{wrap:bw}=field('Gebäude',selBid,v=>{selBid=v;},{options:[['','Kein Gebäude'],...buildings.map(b=>[b.id,b.name])]});
      saveCard.appendChild(bw);
    }
    if(rooms.length){
      const{wrap:rw}=field('Raum',selRid,v=>{selRid=v;},{options:[['','Kein Raum'],...rooms.filter(r=>!selBid||r.bid===selBid).map(r=>[r.id,r.name])]});
      saveCard.appendChild(rw);
    }
    const sbtns=div({style:{display:'flex',gap:'8px',marginTop:'4px'}});
    sbtns.appendChild(btn('🔄 Neu scannen','btn-ghost',()=>{result=null;scanPhoto=null;textInput='';build();}));
    sbtns.appendChild(btn('💾 Speichern','btn-pri btn-sm',()=>{
      const newAsset={id:uid(),bid:selBid,rid:selRid,cat:'TECHNICAL',type:result.assetType||'OTHER',name:result.name||'Neue Anlage',mfr:result.manufacturer||'',model:result.model||'',serial:result.serial||'',year:result.year||null,kw:result.powerKw||null,photos:scanPhoto?[scanPhoto]:[]};
      const assets2=[...DB.get('assets',[]),newAsset];DB.set('assets',assets2);
      if(result.maintenanceRules?.length){

  let html=`<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><title>FacilityMind Wartungsbericht</title>
<style>
body{font-family:Arial,sans-serif;font-size:12px;color:#333;margin:0;padding:20px}

</style></head><body>
<h1>🏭 FacilityMind – Wartungsbericht</h1>
<div class="meta">Erstellt am ${now} · ${buildings.length} Gebäude · ${assets.length} Anlagen · ${plans.length} Wartungspläne</div>`;

  // Summary table
  const sum=plans.reduce((a,p)=>{const s=getSt(p);a[s]=(a[s]||0)+1;return a},{});
  html+=`<h2>📊 Zusammenfassung</h2><table><tr><th>Status</th><th>Anzahl</th></tr>`;
  ['critical','overdue','urgent','soon','ok'].forEach(s=>{
    if(sum[s])html+=`<tr><td><span class="badge ${s}">${statusLabels[s]}</span></td><td>${sum[s]}</td></tr>`;
  });

    const bAssets=assets.filter(a=>a.bid===b.id);
    const bPlans=plans.filter(p=>bAssets.some(a=>a.id===p.aid));
    html+=`<h2>🏢 ${b.name}</h2><div class="meta">${b.address} · ${b.city} · Bj. ${b.year||'–'} · ${b.area||'–'}m²</div>`;
    html+=`<p><strong>Räume:</strong> ${bRooms.length} · <strong>Anlagen:</strong> ${bAssets.length} · <strong>Wartungspläne:</strong> ${bPlans.length}</p>`;

    if(bPlans.length){
      html+=`<h3>Wartungspläne</h3><table><tr><th>Bezeichnung</th><th>Anlage</th><th>Norm</th><th>Fällig</th><th>Status</th><th>Zuständig</th></tr>`;
      bPlans.sort((a2,b2)=>new Date(a2.due)-new Date(b2.due)).forEach(p=>{

        const dLabel=d<0?Math.abs(d)+' T überfällig':d===0?'Heute':'in '+d+' T';
        html+=`<tr><td>${p.title}${p.legal?' <span class="badge legal">§</span>':''}</td><td>${a?.name||'–'}</td><td>${p.norm}</td><td>${new Date(p.due).toLocaleDateString('de-DE')} (${dLabel})</td><td><span class="badge ${s}">${statusLabels[s]}</span></td><td>${p.who||'–'}</td></tr>`;

    });
    html+=`</table>`;
  }

  html+=`<div style="margin-top:30px;padding-top:10px;border-top:1px solid #ddd;color:#999;font-size:10px">Generiert von FacilityMind AI · ${now}</div></body></html>`;

  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);

// ── SERVICE WORKER (inline) ─────────────────────────────────────────────
function registerSW(){
  if(!('serviceWorker' in navigator))return;
  // Minimal SW - no caching of app shell (single HTML file manages itself)
  // Only purpose: make app installable as PWA on iOS
  const sw=`
const CACHE='fm-v9';
self.addEventListener('install',e=>{
  self.skipWaiting();
  e.waitUntil(
    caches.open(CACHE).then(c=>c.addAll([self.location.href.replace(/\/[^\/]*$/,'/')||'/']))
    .catch(()=>{}) // fail silently if offline at install time
  );
});
self.addEventListener('activate',e=>{
  // Delete old caches
  e.waitUntil(
    caches.keys().then(keys=>Promise.all(
      keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))
    ))
  );
  clients.claim();
});
self.addEventListener('fetch',e=>{
  // Never cache API calls
  if(e.request.url.includes('api.anthropic.com')||
     e.request.url.includes('openai.com')||
     e.request.url.includes('cdnjs')){
    e.respondWith(fetch(e.request).catch(()=>new Response('',{status:503})));
    return;
  }
  // For the app HTML: network first, cache fallback
  e.respondWith(
    fetch(e.request)
      .then(r=>{
        if(r.ok){const rc=r.clone();caches.open(CACHE).then(c=>c.put(e.request,rc));}
        return r;
      })
      .catch(()=>caches.match(e.request).then(r=>r||new Response('Offline',{status:503})))
  );
});`;
  const blob=new Blob([sw],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).then(reg=>{
    // Check for updates
    reg.addEventListener('updatefound',()=>{
      console.log('FacilityMind: neue Version verfügbar');
    });
  }).catch(e=>console.warn('SW Fehler:',e));
}

  );
